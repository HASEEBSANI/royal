              <h3>
                <i className="fas fa-user-edit"></i> {user ? 'Edit' : 'Add'} User
              </h3>
              <button className="close-btn" onClick={onClose}>
                <i className="fas fa-times"></i>
              </button>
            </div>
            <div className="modal-body">
              <form onSubmit={handleSubmit}>
                <div className="form-grid">
                  <div className="form-group">
                    <label>Username *</label>
                    <input
                      type="text"
                      value={formData.Username}
                      onChange={(e) => setFormData({...formData, Username: e.target.value})}
                      required
                      disabled={!!user}
                    />
                  </div>
                  <div className="form-group">
                    <label>Email *</label>
                    <input
                      type="email"
                      value={formData.Email}
                      onChange={(e) => setFormData({...formData, Email: e.target.value})}
                      required
                    />
                  </div>
                  <div className="form-group">
                    <label>Password {user ? '(Leave blank to keep current)' : '*'}</label>
                    <input
                      type="password"
                      value={formData.Password}
                      onChange={(e) => setFormData({...formData, Password: e.target.value})}
                      required={!user}
                      autoComplete="new-password"
                    />
                  </div>
                  <div className="form-group">
                    <label>Role</label>
                    <select
                      value={formData.Role}
                      onChange={(e) => setFormData({...formData, Role: e.target.value})}

                      <option value="Admin">Admin</option>

                  <div className="form-group">
                    <label>Status</label>

                      value={formData.Status}
                      onChange={(e) => setFormData({...formData, Status: e.target.value})}
                    >
                      <option value="Active">Active</option>
                      <option value="Inactive">Inactive</option>
                    </select>
                  </div>
                </div>
                <div className="form-actions">
                  <button type="submit" className="btn btn-primary" disabled={saving}>
                    {saving ? (
                      <><i className="fas fa-spinner fa-spin"></i> Saving...</>
                    ) : (
                      <><i className="fas fa-save"></i> Save</>
                    )}
                  </button>
                  <button type="button" className="btn btn-secondary" onClick={onClose}>
                    <i className="fas fa-times"></i> Cancel
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      );
    }

              .withSuccessHandler((r) => {
                setReconciling(false);
                if (r.success) {
                  setReconcileData(r);
                  setShowReconcileModal(true);
                  Swal.close();
                  setTimeout(() => loadParties(), 100);
                } else {
                  Swal.fire({ icon: 'error', title: 'Error', text: r.message });
                }
              })
              .withFailureHandler((err) => {
                setReconciling(false);
                Swal.fire({ icon: 'error', title: 'Error', text: 'Reconciliation failed: ' + err.message });
              })
              .reconcileAllParties(currentUser);
          }
        });
      };

      return (
        <div className="data-section">
          <div className="section-header">
            <h2><i className="fas fa-handshake"></i> Parties</h2>
            <div style={{display: 'flex', gap: '10px'}}>
              <button
                className="btn btn-primary"
                onClick={loadParties}
                disabled={loading}
                title="Refresh Data"
              >
                <i className={`fas fa-sync-alt ${loading ? 'fa-spin' : ''}`}></i> Refresh
              </button>
              <button
                className="btn"
                style={{background: '#fbbc04', color: 'white'}}
                onClick={handleReconcile}
                disabled={loading || reconciling}
                title="Reconcile all party balances and fix missing names"
              >
                <i className={`fas fa-check-double ${reconciling ? 'fa-spin' : ''}`}></i> Reconcile
              </button>
              <button
                className="btn btn-success"
                onClick={() => {
                  setEditingParty(null);
                  setShowModal(true);
                }}
              >
                <i className="fas fa-plus"></i> Add
              </button>
            </div>
          </div>

          {!loading && (
            <div className="filters-section">
              <div className="filters-header">
                <h3><i className="fas fa-filter"></i> Filters</h3>
                <button className="btn btn-secondary btn-sm" onClick={clearFilters}>
                  <i className="fas fa-times-circle"></i> Clear
                </button>
              </div>
              <div className="filters-grid">
                <div className="filter-group">
                  <label><i className="fas fa-search"></i> Search</label>
                  <input
                    type="text"
                    value={filters.search}
                    onChange={(e) => setFilters({...filters, search: e.target.value})}
                    placeholder="Search parties..."
                    className="filter-input"
                  />
                </div>
                <div className="filter-group">
                  <label><i className="fas fa-tag"></i> Party Type</label>
                  <select
                    value={filters.partyType}
                    onChange={(e) => setFilters({...filters, partyType: e.target.value})}
                    className="filter-input"
                  >
                    <option value="">All Types</option>
                    <option value="Customer">Customer</option>
                    <option value="Supplier">Supplier</option>
                    <option value="Both">Both</option>
                  </select>
                </div>
                <div className="filter-group">
                  <label><i className="fas fa-check-circle"></i> Status</label>
                  <select
                    value={filters.isActive}
                    onChange={(e) => setFilters({...filters, isActive: e.target.value})}
                    className="filter-input"
                  >
                    <option value="">All Status</option>
                    <option value="true">Active</option>
                    <option value="false">Inactive</option>
                  </select>
                </div>
              </div>
            </div>
          )}

          {loading && <TableSkeleton rows={8} columns={11} />}
          <div style={{ display: loading ? 'none' : 'block' }}>
            <table id="partiesTable" className="display" style={{width: '100%'}}></table>
          </div>

          {showModal && (
            <PartyModal
              party={editingParty}
              onClose={() => {
                setShowModal(false);
                setEditingParty(null);
              }}
              onSave={handleSave}
            />
          )}

          {showTransactionHistory && selectedParty && (
            <PartyTransactionHistoryModal
              party={selectedParty}
              currentUser={currentUser}
              onClose={() => {
                setShowTransactionHistory(false);
                setSelectedParty(null);
              }}
            />
          )}

          {showReconcileModal && reconcileData && (
            <ReconcileResultsModal
              data={reconcileData}
              onClose={() => {
                setShowReconcileModal(false);
                setReconcileData(null);
              }}
            />
          )}
        </div>
      );
    }

    // ============== Reconcile Results Modal ==============
    function ReconcileResultsModal({ data, onClose }) {
      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal" onClick={(e) => e.stopPropagation()} style={{maxWidth: '900px'}}>
            <div className="modal-header">
              <h3><i className="fas fa-check-double"></i> Reconciliation Results</h3>
              <button className="close-btn" onClick={onClose}>
                <i className="fas fa-times"></i>
              </button>
            </div>
            <div className="modal-body">
              <div style={{marginBottom: '20px', padding: '15px', background: '#d4edda', borderRadius: '4px', border: '1px solid #c3e6cb'}}>
                <h4 style={{color: '#155724', marginBottom: '10px'}}>
                  <i className="fas fa-check-circle"></i> {data.message}
                </h4>
                <div style={{display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '15px', marginTop: '15px'}}>
                  <div style={{textAlign: 'center'}}>
                    <div style={{fontSize: '32px', fontWeight: 'bold', color: '#001f3f'}}>
                      {data.summary.totalPartiesProcessed}
                    </div>
                    <div style={{color: '#666', fontSize: '13px'}}>Parties Processed</div>
                  </div>
                  <div style={{textAlign: 'center'}}>
                    <div style={{fontSize: '32px', fontWeight: 'bold', color: '#fbbc04'}}>
                      {data.summary.totalBalancesFixed}
                    </div>
                    <div style={{color: '#666', fontSize: '13px'}}>Balances Fixed</div>
                  </div>
                  <div style={{textAlign: 'center'}}>
                    <div style={{fontSize: '32px', fontWeight: 'bold', color: '#0074D9'}}>
                      {data.summary.totalNamesFixed}
                    </div>
                    <div style={{color: '#666', fontSize: '13px'}}>Names Fixed</div>
                  </div>
                </div>
              </div>

              {data.details && data.details.length > 0 ? (
                <div>
                  <h4 style={{marginBottom: '15px', color: '#001f3f'}}>
                    <i className="fas fa-list"></i> Changes Made
                  </h4>
                  <div style={{maxHeight: '400px', overflowY: 'auto', border: '1px solid #ddd', borderRadius: '4px'}}>
                    <table style={{width: '100%', borderCollapse: 'collapse'}}>
                      <thead style={{position: 'sticky', top: 0, background: '#001f3f', color: 'white'}}>
                        <tr>
                          <th style={{padding: '10px', textAlign: 'left'}}>Party Name</th>
                          <th style={{padding: '10px', textAlign: 'right'}}>Old Balance</th>
                          <th style={{padding: '10px', textAlign: 'right'}}>New Balance</th>
                          <th style={{padding: '10px', textAlign: 'right'}}>Difference</th>
                          <th style={{padding: '10px', textAlign: 'center'}}>Names Fixed</th>
                          <th style={{padding: '10px', textAlign: 'center'}}>Status</th>
                        </tr>
                      </thead>
                      <tbody>
                        {data.details.map((detail, idx) => (
                          <tr key={idx} style={{borderBottom: '1px solid #eee'}}>
                            <td style={{padding: '10px'}}>{detail.PartyName}</td>
                            <td style={{padding: '10px', textAlign: 'right'}}>
                              {parseFloat(detail.OldBalance).toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}
                            </td>
                            <td style={{padding: '10px', textAlign: 'right'}}>
                              {parseFloat(detail.NewBalance).toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}
                            </td>
                            <td style={{padding: '10px', textAlign: 'right', fontWeight: 'bold', color: detail.BalanceDifference !== 0 ? '#ea4335' : '#34a853'}}>
                              {detail.BalanceDifference !== 0 ? (detail.BalanceDifference > 0 ? '+' : '') : ''}
                              {parseFloat(detail.BalanceDifference).toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}
                            </td>
                            <td style={{padding: '10px', textAlign: 'center'}}>
                              <span style={{background: detail.NamesFixed > 0 ? '#fbbc04' : '#e0e0e0', color: detail.NamesFixed > 0 ? 'white' : '#666', padding: '4px 10px', borderRadius: '12px', fontSize: '12px', fontWeight: 'bold'}}>
                                {detail.NamesFixed}
                              </span>
                            </td>
                            <td style={{padding: '10px', textAlign: 'center', fontSize: '12px'}}>
                              {detail.Status}
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
              ) : (
                <div style={{padding: '30px', textAlign: 'center', color: '#666'}}>
                  <i className="fas fa-check-circle" style={{fontSize: '48px', color: '#34a853', marginBottom: '15px'}}></i>
                  <p style={{fontSize: '16px'}}>All party balances are already correct!</p>
                  <p style={{fontSize: '14px', marginTop: '10px'}}>No changes were needed.</p>
                </div>
              )}

              <div className="form-actions" style={{marginTop: '20px'}}>
                <button className="btn btn-primary" onClick={onClose} style={{width: '100%'}}>
                  <i className="fas fa-check"></i> Close
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ============== Party Modal ==============
    function PartyModal({ party, onClose, onSave }) {
      const [formData, setFormData] = useState({
        PartyName: party?.PartyName || '',
        PartyType: party?.PartyType || 'Customer',
        ContactNumber: party?.ContactNumber || '',
        Address: party?.Address || '',
        OpeningBalance: party?.OpeningBalance || 0,
        BalanceType: party?.BalanceType || 'Debit',
        CurrentBalance: party?.CurrentBalance || 0,
        IsActive: party?.IsActive !== false
      });
      const [saving, setSaving] = useState(false);

      const handleSubmit = (e) => {
        e.preventDefault();
        setSaving(true);
        onSave(formData);
      };

      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal" onClick={(e) => e.stopPropagation()}>
            <div className="modal-header">
              <h3>
                <i className="fas fa-handshake"></i> {party ? 'Edit' : 'Add'} Party
              </h3>
              <button className="close-btn" onClick={onClose}>
                <i className="fas fa-times"></i>
              </button>
            </div>
            <div className="modal-body">
              <form onSubmit={handleSubmit}>
                <div className="form-grid">
                  <div className="form-group">
                    <label>Party Name *</label>
                    <input
                      type="text"
                      value={formData.PartyName}
                      onChange={(e) => setFormData({...formData, PartyName: e.target.value})}
                      required
                    />
                  </div>
                  <div className="form-group">
                    <label>Party Type *</label>
                    <select
                      value={formData.PartyType}
                      onChange={(e) => setFormData({...formData, PartyType: e.target.value})}
                      required
                    >
                      <option value="Customer">Customer</option>
                      <option value="Supplier">Supplier</option>
                      <option value="Both">Both</option>
                    </select>
                  </div>
                  <div className="form-group">
                    <label>Contact Number</label>
                    <input
                      type="tel"
                      value={formData.ContactNumber}
                      onChange={(e) => setFormData({...formData, ContactNumber: e.target.value})}
                      placeholder="+1-555-0000"
                    />
                  </div>
                  <div className="form-group">
                    <label>Address</label>
                    <input
                      type="text"
                      value={formData.Address}
                      onChange={(e) => setFormData({...formData, Address: e.target.value})}
                    />
                  </div>
                  <div className="form-group">
                    <label>Opening Balance *</label>
                    <input
                      type="number"
                      step="0.01"
                      value={formData.OpeningBalance}
                      onChange={(e) => setFormData({...formData, OpeningBalance: e.target.value})}
                      required
                    />
                  </div>
                  <div className="form-group">
                    <label>Balance Type *</label>
                    <select
                      value={formData.BalanceType}
                      onChange={(e) => setFormData({...formData, BalanceType: e.target.value})}
                      required
                    >
                      <option value="Debit">Debit</option>
                      <option value="Credit">Credit</option>
                    </select>
                  </div>
                  <div className="form-group">
                    <label>Current Balance *</label>
                    <input
                      type="number"
                      step="0.01"
                      value={formData.CurrentBalance}
                      onChange={(e) => setFormData({...formData, CurrentBalance: e.target.value})}
                      required
                    />
                  </div>
                  <div className="form-group">
                    <label>Status</label>
                    <select
                      value={formData.IsActive}
                      onChange={(e) => setFormData({...formData, IsActive: e.target.value === 'true'})}
                    >
                      <option value={true}>Active</option>
                      <option value={false}>Inactive</option>
                    </select>
                  </div>
                </div>
                <div className="form-actions">
                  <button type="submit" className="btn btn-primary" disabled={saving}>
                    {saving ? (
                      <><i className="fas fa-spinner fa-spin"></i> Saving...</>
                    ) : (
                      <><i className="fas fa-save"></i> Save</>
                    )}
                  </button>
                  <button type="button" className="btn btn-secondary" onClick={onClose}>
                    <i className="fas fa-times"></i> Cancel
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      );
    }

    // ============== Party Transaction History Modal ==============
    function PartyTransactionHistoryModal({ party, currentUser, onClose }) {
      const [loading, setLoading] = useState(true);
      const [transactions, setTransactions] = useState([]);
      const [dateFilter, setDateFilter] = useState('30days');
      const [stats, setStats] = useState({ totalAmount: 0, totalCredit: 0, totalDebit: 0 });
      const tableInstanceRef = useRef(null);

      useEffect(() => {
        loadTransactionHistory();
        return () => {
          if (tableInstanceRef.current) {
            try {
              tableInstanceRef.current.destroy();
              tableInstanceRef.current = null;
            } catch (e) {}
          }
        };
      }, [dateFilter]);

      const loadTransactionHistory = () => {
        setLoading(true);
        google.script.run
          .withSuccessHandler((result) => {
            setLoading(false);
            if (result.success) {
              setTransactions(result.data);
              setStats({
                totalAmount: result.totalAmount || 0,
                totalCredit: result.totalCredit || 0,
                totalDebit: result.totalDebit || 0
              });
              setTimeout(() => initializeDataTable(result.data), 100);
            } else {
              Swal.fire({ icon: 'error', title: 'Error', text: result.message });
            }
          })
          .withFailureHandler((err) => {
            setLoading(false);
            Swal.fire({ icon: 'error', title: 'Error', text: err.message });
          })
          .getPartyTransactionHistory(party.PartyID, dateFilter);
      };

      const initializeDataTable = (data) => {
        if (tableInstanceRef.current) {
          try {
            tableInstanceRef.current.destroy();
            tableInstanceRef.current = null;
            $('#partyTransactionsTable').empty();
          } catch (e) {}
        }

        setTimeout(() => {
          try {
            const table = $('#partyTransactionsTable').DataTable({
              data: data,
              destroy: true,
              columns: [
                {
                  data: 'TransactionDate',
                  title: 'Date',
                  render: (d) => {
                    try {
                      const date = new Date(d);
                      return date.toLocaleDateString('en-US', {
                        year: 'numeric',
                        month: 'short',
                        day: '2-digit'
                      });
                    } catch (e) {
                      return 'N/A';
                    }
                  }
                },
                { data: 'InvoiceNo', title: 'Invoice/Ref No' },
                { data: 'TransactionType', title: 'Type' },
                {
                  data: 'DebitAmount',
                  title: 'Debit',
                  render: (d) => {
                    const val = parseFloat(d) || 0;
                    return val > 0 ? val.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : '-';
                  }
                },
                {
                  data: 'CreditAmount',
                  title: 'Credit',
                  render: (d) => {
                    const val = parseFloat(d) || 0;
                    return val > 0 ? val.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : '-';
                  }
                },
                {
                  data: 'RunningBalance',
                  title: 'Balance',
                  render: (d) => {
                    const val = parseFloat(d) || 0;
                    const formatted = val.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                    const color = val >= 0 ? '#34a853' : '#ea4335';
                    return `<span style="color: ${color}; font-weight: 600;">${formatted}</span>`;
                  }
                },
                { data: 'PaymentMode', title: 'Payment Mode' },
                { data: 'Narration', title: 'Narration' },
                {
                  data: 'CreatedAt',
                  title: 'Entry Date',
                  render: (d) => {
                    try {
                      const date = new Date(d);
                      return date.toLocaleString('en-US', {
                        year: 'numeric',
                        month: 'short',
                        day: '2-digit',
                        hour: '2-digit',
                        minute: '2-digit'
                      });
                    } catch (e) {
                      return 'N/A';
                    }
                  }
                }
              ],
              pageLength: 10,
              lengthMenu: [[10, 25, 50, 100, -1], [10, 25, 50, 100, "All"]],
              responsive: true,
              dom: 'Blfrtip',
              buttons: [
                {
                  extend: 'csv',
                  text: '<i class="fas fa-file-csv"></i> CSV',
                  title: `${party.PartyName}_Transactions_${dateFilter}`,
                  exportOptions: { columns: ':visible' }
                },
                {
                  extend: 'pdf',
                  text: '<i class="fas fa-file-pdf"></i> PDF',
                  title: `${party.PartyName} - Transaction History`,
                  exportOptions: { columns: ':visible' }
                },
                {
                  extend: 'print',
                  text: '<i class="fas fa-print"></i> Print',
                  title: `${party.PartyName} - Transaction History (${dateFilter})`,
                  exportOptions: { columns: ':visible' }
                }
              ],
              order: [[0, 'desc']]
            });

            tableInstanceRef.current = table;
          } catch (e) {
            console.error('DataTable initialization error:', e);
            Swal.fire({ icon: 'error', title: 'Error', text: 'Failed to initialize table: ' + e.message });
          }
        }, 150);
      };

      const getFilterLabel = (filter) => {
        switch(filter) {
          case '30days': return '30 Days';
          case '6months': return '6 Months';
          case '1year': return '1 Year';
          case 'lifetime': return 'Lifetime';
          default: return '30 Days';
        }
      };

      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal modal-large" onClick={(e) => e.stopPropagation()}>
            <div className="modal-header">
              <h3>
                <i className="fas fa-exchange-alt"></i> Transaction History - {party.PartyName}
              </h3>
              <button className="close-btn" onClick={onClose}>
                <i className="fas fa-times"></i>
              </button>
            </div>
            <div className="modal-body">
              {/* Date Filter Buttons */}
              <div className="date-filter-section">
                <div className="date-filter-buttons">
                  <button
                    className={`filter-btn ${dateFilter === '30days' ? 'active' : ''}`}
                    onClick={() => setDateFilter('30days')}
                  >
                    <i className="fas fa-calendar-day"></i> 30 Days
                  </button>
                  <button
                    className={`filter-btn ${dateFilter === '6months' ? 'active' : ''}`}
                    onClick={() => setDateFilter('6months')}
                  >
                    <i className="fas fa-calendar-week"></i> 6 Months
                  </button>
                  <button
                    className={`filter-btn ${dateFilter === '1year' ? 'active' : ''}`}
                    onClick={() => setDateFilter('1year')}
                  >
                    <i className="fas fa-calendar-alt"></i> 1 Year
                  </button>
                  <button
                    className={`filter-btn ${dateFilter === 'lifetime' ? 'active' : ''}`}
                    onClick={() => setDateFilter('lifetime')}
                  >
                    <i className="fas fa-infinity"></i> Lifetime
                  </button>
                </div>
              </div>

              {/* Stats Cards */}
              {!loading && (
                <div className="transaction-stats-grid">
                  <div className="stat-card-small">
                    <div className="stat-icon" style={{background: 'linear-gradient(135deg, #001f3f 0%, #003366 100%)'}}>
                      <i className="fas fa-wallet"></i>
                    </div>
                    <div className="stat-details">
                      <div className="stat-label">Total Amount</div>
                      <div className="stat-value">{stats.totalAmount.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</div>
                    </div>
                  </div>
                  <div className="stat-card-small">
                    <div className="stat-icon" style={{background: 'linear-gradient(135deg, #34a853 0%, #2d8e47 100%)'}}>
                      <i className="fas fa-arrow-down"></i>
                    </div>
                    <div className="stat-details">
                      <div className="stat-label">Total Credit</div>
                      <div className="stat-value" style={{color: '#34a853'}}>{stats.totalCredit.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</div>
                    </div>
                  </div>
                  <div className="stat-card-small">
                    <div className="stat-icon" style={{background: 'linear-gradient(135deg, #ea4335 0%, #c5392f 100%)'}}>
                      <i className="fas fa-arrow-up"></i>
                    </div>
                    <div className="stat-details">
                      <div className="stat-label">Total Debit</div>
                      <div className="stat-value" style={{color: '#ea4335'}}>{stats.totalDebit.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</div>
                    </div>
                  </div>
                </div>
              )}

              {/* Transaction Table */}
              {loading && <TableSkeleton rows={8} columns={9} />}
              <div style={{ display: loading ? 'none' : 'block', marginTop: '20px' }}>
                <table id="partyTransactionsTable" className="display" style={{width: '100%'}}></table>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ============== Cash Book Management ==============
    function CashBookView({ currentUser, role }) {
      const [loading, setLoading] = useState(true);
      const [showModal, setShowModal] = useState(false);
      const [editingEntry, setEditingEntry] = useState(null);
      const [entries, setEntries] = useState([]);
      const [parties, setParties] = useState([]);
      const tableInstanceRef = useRef(null);

      const [filters, setFilters] = useState({
        dateFrom: '',
        dateTo: '',
        entryType: '',
        paymentMode: '',
        search: ''
      });

      useEffect(() => {
        loadEntries();
        loadParties();
        return () => {
          if (tableInstanceRef.current) {
            try {
              tableInstanceRef.current.destroy();
              tableInstanceRef.current = null;
            } catch (e) {}
          }
        };
      }, []);

      const loadEntries = () => {
        setLoading(true);
        google.script.run
          .withSuccessHandler((result) => {
            setLoading(false);
            if (result.success) {
              setEntries(result.data);
              setTimeout(() => initializeDataTable(result.data), 100);
            } else {
              Swal.fire({ icon: 'error', title: 'Error', text: result.message });
            }
          })
          .withFailureHandler((err) => {
            setLoading(false);
            Swal.fire({ icon: 'error', title: 'Error', text: err.message });
          })
          .getCashBookEntries(currentUser, role);
      };

      const loadParties = () => {
        google.script.run
          .withSuccessHandler((result) => {
            if (result.success) {
              setParties(result.data.filter(p => p.IsActive));
            }
          })
          .getAllParties(currentUser, role);
      };

      const initializeDataTable = (data) => {
        if (tableInstanceRef.current) {
          try {
            tableInstanceRef.current.destroy();
            tableInstanceRef.current = null;
            $('#cashBookTable').empty();
          } catch (e) {}
        }

        setTimeout(() => {
          try {
            const table = $('#cashBookTable').DataTable({
              data: data,
              destroy: true,
              columns: [
                { data: 'VoucherNo', title: 'Voucher No' },
                {
                  data: 'TransactionDate',
                  title: 'Date',
                  render: (d) => {
                    if (!d) return 'N/A';
                    try {
                      const date = new Date(d);
                      return date.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: '2-digit' });
                    } catch (e) {
                      return 'N/A';
                    }
                  }
                },
                { data: 'Particulars', title: 'Particulars' },
                { data: 'EntryType', title: 'Entry Type' },
                { data: 'PartyName', title: 'Party', render: (d) => d || '-' },
                {
                  data: 'CashIn',
                  title: 'Cash In',
                  render: (d) => {
                    const val = parseFloat(d) || 0;
                    return val > 0 ? val.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : '-';
                  }
                },
                {
                  data: 'CashOut',
                  title: 'Cash Out',
                  render: (d) => {
                    const val = parseFloat(d) || 0;
                    return val > 0 ? val.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : '-';
                  }
                },
                {
                  data: 'RunningBalance',
                  title: 'Balance',
                  render: (d) => {
                    const val = parseFloat(d) || 0;
                    const formatted = val.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                    return `<span style="color: ${val >= 0 ? '#34a853' : '#ea4335'}; font-weight: 600;">${formatted}</span>`;
                  }
                },
                { data: 'PaymentMode', title: 'Payment Mode' },
                { data: 'ReferenceNo', title: 'Reference', render: (d) => d || '-' },
                {
                  data: null,
                  title: 'Actions',
                  orderable: false,
                  render: (d, t, row) => `
                    <button class="action-icon edit-icon" data-action="edit">
                      <i class="fas fa-edit"></i>
                    </button>
                    <button class="action-icon delete-icon" data-action="delete">
                      <i class="fas fa-trash"></i>
                    </button>
                  `
                }
              ],
              pageLength: 10,
              lengthMenu: [[10, 25, 50, 100, -1], [10, 25, 50, 100, "All"]],
              responsive: true,
              dom: 'Blfrtip',
              buttons: [
                {
                  extend: 'csv',
                  text: '<i class="fas fa-file-csv"></i> CSV',
                  exportOptions: { columns: ':not(:last-child)' }
                },
                {
                  extend: 'pdf',
                  text: '<i class="fas fa-file-pdf"></i> PDF',
                  exportOptions: { columns: ':not(:last-child)' }
                },
                {
                  extend: 'print',
                  text: '<i class="fas fa-print"></i> Print',
                  exportOptions: { columns: ':not(:last-child)' }
                }
              ],
              order: [[1, 'desc']]
            });

            $('#cashBookTable').off('click', '.action-icon');
            $('#cashBookTable').on('click', '.action-icon', function() {
              const action = $(this).data('action');
              const rowData = table.row($(this).parents('tr')).data();

              if (action === 'edit') {
                setEditingEntry(rowData);
                setShowModal(true);
              } else if (action === 'delete') {
                handleDelete(rowData);
              }
            });

            tableInstanceRef.current = table;
          } catch (e) {
            console.error('DataTable initialization error:', e);
            Swal.fire({ icon: 'error', title: 'Error', text: 'Failed to initialize table: ' + e.message });
          }
        }, 150);
      };

      const applyFilters = () => {
        if (!tableInstanceRef.current) return;

        $.fn.dataTable.ext.search.pop();
        $.fn.dataTable.ext.search.push(function(settings, data, dataIndex) {
          const entry = entries[dataIndex];
          if (!entry) return true;

          // Date range filter
          if (filters.dateFrom || filters.dateTo) {
            const transactionDate = new Date(entry.TransactionDate);
            const fromDate = filters.dateFrom ? new Date(filters.dateFrom) : null;
            const toDate = filters.dateTo ? new Date(filters.dateTo + 'T23:59:59') : null;

            if (fromDate && transactionDate < fromDate) return false;
            if (toDate && transactionDate > toDate) return false;
          }

          return true;
        });

        tableInstanceRef.current.columns().search('').draw();

        if (filters.entryType) {
          tableInstanceRef.current.column(3).search(filters.entryType).draw(false);
        }
        if (filters.paymentMode) {
          tableInstanceRef.current.column(8).search(filters.paymentMode).draw(false);
        }
        if (filters.search) {
          tableInstanceRef.current.search(filters.search).draw(false);
        }

        tableInstanceRef.current.draw();
      };

      const clearFilters = () => {
        setFilters({ dateFrom: '', dateTo: '', entryType: '', paymentMode: '', search: '' });
        if (tableInstanceRef.current) {
          $.fn.dataTable.ext.search.pop();
          tableInstanceRef.current.search('').columns().search('').draw();
        }
      };

      useEffect(() => {
        if (tableInstanceRef.current && entries.length > 0) {
          applyFilters();
        }
      }, [filters]);

      const handleSave = (entryData) => {
        const action = editingEntry ? 'updateCashBookEntry' : 'addCashBookEntry';
        const params = editingEntry ? [editingEntry.CashID, entryData, currentUser] : [entryData, currentUser];

        google.script.run
          .withSuccessHandler((result) => {
            if (result.success) {
              setShowModal(false);
              setEditingEntry(null);
              Swal.fire({
                icon: 'success',
                title: 'Success!',
                text: result.message,
                timer: 2000,
                showConfirmButton: false
              });
              setTimeout(() => loadEntries(), 100);
            } else {
              Swal.fire({ icon: 'error', title: 'Error', text: result.message });
            }
          })
          .withFailureHandler((err) => {
            Swal.fire({ icon: 'error', title: 'Error', text: err.message });
          })
          [action](...params);
      };

      const handleDelete = (entry) => {
        Swal.fire({
          icon: 'warning',
          title: 'Delete Entry?',
          text: `Delete cash entry "${entry.VoucherNo}"? This cannot be undone.`,
          showCancelButton: true,
          confirmButtonColor: '#ea4335',
          confirmButtonText: 'Delete'
        }).then((result) => {
          if (result.isConfirmed) {
            google.script.run
              .withSuccessHandler((r) => {
                if (r.success) {
                  Swal.fire({
                    icon: 'success',
                    text: r.message,
                    timer: 2000,
                    showConfirmButton: false
                  });
                  setTimeout(() => loadEntries(), 100);
                } else {
                  Swal.fire({ icon: 'error', title: 'Error', text: r.message });
                }
              })
              .withFailureHandler((err) => {
                Swal.fire({ icon: 'error', title: 'Error', text: err.message });
              })
              .deleteCashBookEntry(entry.CashID, currentUser);
          }
        });
      };

      return (
        <div className="data-section">
          <div className="section-header">
            <h2><i className="fas fa-book"></i> Cash Book</h2>
            <div style={{display: 'flex', gap: '10px'}}>
              <button
                className="btn btn-primary"
                onClick={loadEntries}
                disabled={loading}
                title="Refresh Data"
              >
                <i className={`fas fa-sync-alt ${loading ? 'fa-spin' : ''}`}></i> Refresh
              </button>
              <button
                className="btn btn-success"
                onClick={() => {
                  setEditingEntry(null);
                  setShowModal(true);
                }}
              >
                <i className="fas fa-plus"></i> Add Entry
              </button>
            </div>
          </div>

          {!loading && (
            <div className="filters-section">
              <div className="filters-header">
                <h3><i className="fas fa-filter"></i> Filters</h3>
                <button className="btn btn-secondary btn-sm" onClick={clearFilters}>
                  <i className="fas fa-times-circle"></i> Clear
                </button>
              </div>
              <div className="filters-grid">
                <div className="filter-group">
                  <label><i className="fas fa-search"></i> Search</label>
                  <input
                    type="text"
                    value={filters.search}
                    onChange={(e) => setFilters({...filters, search: e.target.value})}
                    placeholder="Search entries..."
                    className="filter-input"
                  />
                </div>
                <div className="filter-group">
                  <label><i className="fas fa-calendar-alt"></i> Date From</label>
                  <input
                    type="date"
                    value={filters.dateFrom}
                    onChange={(e) => setFilters({...filters, dateFrom: e.target.value})}
                    className="filter-input"
                  />
                </div>
                <div className="filter-group">
                  <label><i className="fas fa-calendar-alt"></i> Date To</label>
                  <input
                    type="date"
                    value={filters.dateTo}
                    onChange={(e) => setFilters({...filters, dateTo: e.target.value})}
                    className="filter-input"
                  />
                </div>
                <div className="filter-group">
                  <label><i className="fas fa-tag"></i> Entry Type</label>
                  <select
                    value={filters.entryType}
                    onChange={(e) => setFilters({...filters, entryType: e.target.value})}
                    className="filter-input"
                  >
                    <option value="">All Types</option>
                    <option value="Cash">Cash</option>
                    <option value="Customer">Customer</option>
                    <option value="Supplier">Supplier</option>
                  </select>
                </div>
                <div className="filter-group">
                  <label><i className="fas fa-credit-card"></i> Payment Mode</label>
                  <select
                    value={filters.paymentMode}
                    onChange={(e) => setFilters({...filters, paymentMode: e.target.value})}
                    className="filter-input"
                  >
                    <option value="">All Modes</option>
                    <option value="Cash">Cash</option>
                    <option value="Bank">Bank</option>
                    <option value="Cheque">Cheque</option>
                    <option value="Online">Online</option>
                  </select>
                </div>
              </div>
            </div>
          )}

          {loading && <TableSkeleton rows={8} columns={11} />}
          <div style={{ display: loading ? 'none' : 'block' }}>
            <table id="cashBookTable" className="display" style={{width: '100%'}}></table>
          </div>

          {showModal && (
            <CashBookModal
              entry={editingEntry}
              parties={parties}
              onClose={() => {
                setShowModal(false);
                setEditingEntry(null);
              }}
              onSave={handleSave}
            />
          )}
        </div>
      );
    }


// ============== Cash Book Modal ==============
function CashBookModal({ entry, parties, onClose, onSave }) {
  const [formData, setFormData] = useState({
    TransactionDate: new Date().toISOString().split('T')[0],
    Particulars: '',
    Amount: '',
    EntryType: 'Cash',
    PartyID: '',
    PaymentMode: 'Cash',
    ReferenceNo: ''
  });

  const [activeMode, setActiveMode] = useState('Cash In');
  const [saving, setSaving] = useState(false);

  // FIX: This fills the form when you click EDIT 
  // AND clears it when you click ADD NEW
  useEffect(() => {
    if (entry) {
      setFormData({
        TransactionDate: entry.TransactionDate ? new Date(entry.TransactionDate).toISOString().split('T')[0] : new Date().toISOString().split('T')[0],
        Particulars: entry.Particulars || '',
        Amount: entry.CashIn || entry.CashOut || '',
        EntryType: entry.EntryType || 'Cash',
        PartyID: entry.PartyID || '',
        PaymentMode: entry.PaymentMode || 'Cash',
        ReferenceNo: entry.ReferenceNo || ''
      });
      setActiveMode(entry.CashOut > 0 ? 'Cash Out' : 'Cash In');
    } else {
      // RESET FORM FOR NEW ENTRY
      setFormData({
        TransactionDate: new Date().toISOString().split('T')[0],
        Particulars: '',
        Amount: '',
        EntryType: 'Cash',
        PartyID: '',
        PaymentMode: 'Cash',
        ReferenceNo: ''
      });
      setActiveMode('Cash In');
    }
    setSaving(false);
  }, [entry]);

  const handleSubmit = (e) => {
    e.preventDefault();
    const amount = parseFloat(formData.Amount) || 0;
    if (amount <= 0) {
      Swal.fire({ icon: 'error', title: 'Invalid Amount', text: 'Please enter a valid amount!' });
      return;
    }

    const finalData = {
      ...formData,
      // CRITICAL: Pass both IDs to ensure backend can find the row
      CashID: entry?.CashID || null, 
      VoucherNo: entry?.VoucherNo || null, 
      CashIn: activeMode === 'Cash In' ? amount : 0,
      CashOut: activeMode === 'Cash Out' ? amount : 0
    };
    delete finalData.Amount;

    // Mobile Confirmation for Cash Out
    if (activeMode === 'Cash Out' && !entry) {
        Swal.fire({
            title: 'Confirm Cash Out',
            text: `Confirming payment of ₹${amount}`,
            icon: 'warning',
            showCancelButton: true,
            confirmButtonText: 'Yes, Save'
        }).then((result) => {
            if (result.isConfirmed) {
                setSaving(true);
                onSave(finalData);
            }
        });
    } else {
        setSaving(true);
        onSave(finalData);
    }
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={(e) => e.stopPropagation()}>
        <div className="modal-header">
          <h3>
            <i className="fas fa-book"></i> {entry ? `Edit Voucher ${entry.VoucherNo}` : 'Add Cash Entry'}
          </h3>
          <button className="close-btn" onClick={onClose}><i className="fas fa-times"></i></button>
        </div>
        
        <div className="modal-body">
          <form onSubmit={handleSubmit}>
            
            {/* 1. ENTRY MODE TOGGLE */}
            <div className="form-group" style={{gridColumn: '1 / -1'}}>
              <label>Entry Mode *</label>
              <div className="entry-mode-toggle">
                <button 
                  type="button" 
                  className={`mode-btn mode-in ${activeMode === 'Cash In' ? 'active' : ''}`} 
                  onClick={() => setActiveMode('Cash In')}
                >
                  <i className="fas fa-arrow-down"></i> CASH IN
                </button>
                <button 
                  type="button" 
                  className={`mode-btn mode-out ${activeMode === 'Cash Out' ? 'active' : ''}`} 
                  onClick={() => setActiveMode('Cash Out')}
                >
                  <i className="fas fa-arrow-up"></i> CASH OUT
                </button>
              </div>
            </div>

            <div className="form-grid">
              {/* 2. AMOUNT */}
              <div className="form-group">
                <label>Amount (₹) *</label>
                <input 
                  type="number" 
                  inputMode="decimal" 
                  step="0.01" 
                  value={formData.Amount} 
                  onChange={(e) => setFormData({...formData, Amount: e.target.value})} 
                  required 
                  autoFocus 
                />
              </div>

              {/* 3. DATE */}
              <div className="form-group">
                <label>Transaction Date *</label>
                <input 
                  type="date" 
                  value={formData.TransactionDate} 
                  onChange={(e) => setFormData({...formData, TransactionDate: e.target.value})} 
                  required 
                />
              </div>

              {/* 4. ENTRY TYPE */}
              <div className="form-group">
                <label>Entry Type *</label>
                <select 
                  value={formData.EntryType} 
                  onChange={(e) => setFormData({...formData, EntryType: e.target.value, PartyID: ''})} 
                  required
                >
                  <option value="Cash">Cash</option>
                  <option value="Customer">Customer</option>
                  <option value="Supplier">Supplier</option>
                </select>
              </div>

              {/* 5. PARTY SELECTION (Conditional) */}
              {(formData.EntryType === 'Customer' || formData.EntryType === 'Supplier') && (
                <div className="form-group">
                  <label>Select Party *</label>
                  <select 
                    value={formData.PartyID} 
                    onChange={(e) => setFormData({...formData, PartyID: e.target.value})} 
                    required
                  >
                    <option value="">-- Select Party --</option>
                    {parties
                      .filter(p => p.PartyType === formData.EntryType || p.PartyType === 'Both')
                      .map((party) => (
                        <option key={party.PartyID} value={party.PartyID}>{party.PartyName}</option>
                      ))
                    }
                  </select>
                </div>
              )}

              {/* 6. PARTICULARS */}
              <div className="form-group" style={{gridColumn: '1 / -1'}}>
                <label>Particulars *</label>
                <textarea 
                  rows="2" 
                  value={formData.Particulars} 
                  onChange={(e) => setFormData({...formData, Particulars: e.target.value})} 
                  required 
                />
              </div>

              {/* 7. PAYMENT MODE */}
              <div className="form-group">
                <label>Payment Mode *</label>
                <select 
                  value={formData.PaymentMode} 
                  onChange={(e) => setFormData({...formData, PaymentMode: e.target.value})} 
                  required
                >
                  <option value="Cash">Cash</option>
                  <option value="Bank">Bank</option>
                  <option value="Cheque">Cheque</option>
                  <option value="Online">Online</option>
                </select>
              </div>

              {/* 8. REFERENCE NO */}
              <div className="form-group">
                <label>Reference No</label>
                <input 
                  type="text" 
                  value={formData.ReferenceNo} 
                  onChange={(e) => setFormData({...formData, ReferenceNo: e.target.value})} 
                  placeholder="Ref No." 
                />
              </div>
            </div>

            <div className="form-actions">
              <button type="submit" className="btn btn-primary" disabled={saving}>
                {saving ? (
                  <><i className="fas fa-spinner fa-spin"></i> Saving...</>
                ) : (
                  <><i className="fas fa-save"></i> {entry ? 'Update' : 'Save'}</>
                )}
              </button>
              <button type="button" className="btn btn-secondary" onClick={onClose}>
                Cancel
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  );
}

// ============== Daybook View ==============
function DaybookView({ currentUser, role, currencySymbol }) {
  const [loading, setLoading] = useState(true);
  const [showModal, setShowModal] = useState(false);
  const [editingId, setEditingId] = useState(null);
  const [entries, setEntries] = useState([]);
  const tableInstanceRef = useRef(null);

  // --- NEW: Filter State ---
  const [filters, setFilters] = useState({
    dateFrom: '',
    dateTo: ''
  });

  const [formData, setFormData] = useState({
    date: '',
    cash: '',
    online: '',
    expenses: ''
  });

  useEffect(() => {
    loadEntries();
    return () => {
      if (tableInstanceRef.current) {
        try {
          // Clean up DataTables custom search to prevent bleeding into other pages
          $.fn.dataTable.ext.search.pop();
          tableInstanceRef.current.destroy();
          tableInstanceRef.current = null;
        } catch (e) {}
      }
    };
  }, []);

  const loadEntries = () => {
    setLoading(true);
    google.script.run
      .withSuccessHandler((data) => {
        setLoading(false);
        setEntries(data);
        setTimeout(() => initializeDataTable(data), 150);
      })
      .withFailureHandler((error) => {
        setLoading(false);
        Swal.fire({ icon: 'error', title: 'Error', text: error.message });
      })
      .getDaybookEntries();
  };

  const calculateTotal = (cash, online, expenses) => {
    const c = parseFloat(cash) || 0;
    const o = parseFloat(online) || 0;
    const e = parseFloat(expenses) || 0;
    return c + o + e;
  };

  const initializeDataTable = (data) => {
    if (tableInstanceRef.current) {
      try {
        tableInstanceRef.current.destroy();
        tableInstanceRef.current = null;
        $('#daybookTable').empty();
      } catch (e) {}
    }

    setTimeout(() => {
      try {
        const table = $('#daybookTable').DataTable({
          data: data || [],
          destroy: true,
          columns: [
            {
              data: 'date',
              title: 'Date',
              render: (d) => {
                if (!d) return 'N/A';
                try {
                  const dateObj = new Date(d);
                  if (isNaN(dateObj.getTime())) return String(d);
                  return dateObj.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: '2-digit' });
                } catch (err) {
                  return String(d);
                }
              }
            },
            {
              data: 'cash',
              title: 'Cash IN',
              render: (d) => `${currencySymbol} ${(parseFloat(d) || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`
            },
            {
              data: 'online',
              title: 'Online IN',
              render: (d) => `${currencySymbol} ${(parseFloat(d) || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`
            },
            {
              data: 'expenses',
              title: 'Expense',
              render: (d) => `${currencySymbol} ${(parseFloat(d) || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`
            },
            {
              data: null,
              title: 'Total Sale',
              render: (d, t, row) => {
                const total = calculateTotal(row.cash, row.online, row.expenses);
                return `<strong>${currencySymbol} ${total.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</strong>`;
              }
            },
            {
              data: null,
              title: 'Actions',
              orderable: false,
              render: () => `
                <button class="action-icon edit-icon" data-action="edit">
                  <i class="fas fa-pen"></i>
                </button>
                <button class="action-icon delete-icon" data-action="delete">
                  <i class="fas fa-trash"></i>
                </button>
              `
            }
          ],
          pageLength: 10,
          lengthMenu: [[10, 25, 50, 100, -1], [10, 25, 50, 100, "All"]],
          responsive: true,
          dom: 'Blfrtip',
          buttons: [
            { extend: 'csv', text: '<i class="fas fa-file-csv"></i> CSV', exportOptions: { columns: ':not(:last-child)' } },
            { extend: 'pdf', text: '<i class="fas fa-file-pdf"></i> PDF', exportOptions: { columns: ':not(:last-child)' } },
            { extend: 'print', text: '<i class="fas fa-print"></i> Print', exportOptions: { columns: ':not(:last-child)' } }
          ],
          order: [[0, 'desc']]
        });

        $('#daybookTable').off('click', '.action-icon');
        $('#daybookTable').on('click', '.action-icon', function () {
          const action = $(this).data('action');
          const rowData = table.row($(this).parents('tr')).data();

          if (action === 'edit') {
            setFormData({
              date: rowData.date ? new Date(rowData.date).toISOString().split('T')[0] : '', 
              cash: rowData.cash || '',
              online: rowData.online || '',
              expenses: rowData.expenses || ''
            });
            setEditingId(rowData.id);
            setShowModal(true);
          } else if (action === 'delete') {
            handleDelete(rowData.id);
          }
        });

        tableInstanceRef.current = table;
        
        // Re-apply filters instantly if they exist
        if (filters.dateFrom || filters.dateTo) {
          applyFilters();
        }
      } catch (e) {
        console.error('DataTable initialization error:', e);
        Swal.fire({ icon: 'error', title: 'Table Error', text: 'Failed to initialize table: ' + e.message });
      }
    }, 150);
  };

  // --- NEW: Apply Filters Logic ---
  const applyFilters = () => {
    if (!tableInstanceRef.current) return;

    // Clear previous filters
    $.fn.dataTable.ext.search.pop();

    if (filters.dateFrom || filters.dateTo) {
      $.fn.dataTable.ext.search.push(function (settings, data, dataIndex) {
        // Ensure we are only filtering the Daybook table
        if (settings.nTable.id !== 'daybookTable') return true;

        const timestamp = entries[dataIndex]?.date;
        if (!timestamp) return true;

        const recordDate = new Date(timestamp);
        const fromDate = filters.dateFrom ? new Date(filters.dateFrom) : null;
        const toDate = filters.dateTo ? new Date(filters.dateTo + 'T23:59:59') : null;

        if (fromDate && recordDate < fromDate) return false;
        if (toDate && recordDate > toDate) return false;
        return true;
      });
    }

    tableInstanceRef.current.draw();
  };

  const clearFilters = () => {
    setFilters({ dateFrom: '', dateTo: '' });
    if (tableInstanceRef.current) {
      $.fn.dataTable.ext.search.pop();
      tableInstanceRef.current.draw();
    }
  };

  // Trigger filters whenever the filter state changes
  useEffect(() => {
    if (tableInstanceRef.current && entries.length > 0) {
      applyFilters();
    }
  }, [filters]);

  const handleOpenAdd = () => {
    setFormData({ date: '', cash: '', online: '', expenses: '' });
    setEditingId(null);
    setShowModal(true);
  };

  const handleSave = () => {
    if (!formData.date) {
      Swal.fire({ icon: 'error', title: 'Oops...', text: 'Please select a date!' });
      return;
    }

    Swal.fire({ title: 'Saving...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });

    if (editingId) {
      google.script.run
        .withSuccessHandler(() => {
          setShowModal(false);
          Swal.fire({ icon: 'success', title: 'Updated!', text: 'Successfully.', timer: 1500, showConfirmButton: false });
          loadEntries();
        })
        .updateDaybookEntry(editingId, formData);
    } else {
      google.script.run
        .withSuccessHandler(() => {
          setShowModal(false);
          Swal.fire({ icon: 'success', title: 'Saved!', text: 'Successfully.', timer: 1500, showConfirmButton: false });
          loadEntries();
        })
        .addDaybookEntry(formData);
    }
  };

  const handleDelete = (id) => {
    Swal.fire({
      title: 'Are you sure?',
      text: "This will delete the record from your Google Sheet!",
      icon: 'warning',
      showCancelButton: true,
      confirmButtonColor: '#ea4335',
      confirmButtonText: 'Yes, delete it!'
    }).then((result) => {
      if (result.isConfirmed) {
        Swal.fire({ title: 'Deleting...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });
        
        google.script.run
          .withSuccessHandler(() => {
            Swal.fire({ icon: 'success', title: 'Deleted!', text: 'Removed from sheet.', timer: 1500, showConfirmButton: false });
            loadEntries();
          })
          .deleteDaybookEntry(id);
      }
    });
  };

  return (
    <div className="main-content">
      <div className="header">
        <h1><i className="fas fa-calendar-day"></i> Daybook</h1>
      </div>

      <div className="data-section">
        <div className="section-header">
          <h2>Daybook Records</h2>
          <div style={{display: 'flex', gap: '10px'}}>
            <button
              className="btn btn-primary"
              onClick={loadEntries}
              disabled={loading}
              title="Refresh Data"
            >
              <i className={`fas fa-sync-alt ${loading ? 'fa-spin' : ''}`}></i> Refresh
            </button>
            <button className="btn btn-success" onClick={handleOpenAdd}>
              <i className="fas fa-plus"></i> Add Entry
            </button>
          </div>
        </div>

        {/* --- NEW: Filters Section UI --- */}
        {!loading && (
          <div className="filters-section">
            <div className="filters-header">
              <h3>
                <i className="fas fa-filter"></i> Filters
              </h3>
              <button className="btn btn-secondary btn-sm" onClick={clearFilters}>
                <i className="fas fa-times-circle"></i> Clear All
              </button>
            </div>
            <div className="filters-grid" style={{ gridTemplateColumns: 'repeat(2, 1fr)' }}>
              <div className="filter-group">
                <label>
                  <i className="fas fa-calendar-alt"></i> Date From
                </label>
                <input
                  type="date"
                  value={filters.dateFrom}
                  onChange={(e) => setFilters({ ...filters, dateFrom: e.target.value })}
                  className="filter-input"
                />
              </div>
              <div className="filter-group">
                <label>
                  <i className="fas fa-calendar-alt"></i> Date To
                </label>
                <input
                  type="date"
                  value={filters.dateTo}
                  onChange={(e) => setFilters({ ...filters, dateTo: e.target.value })}
                  className="filter-input"
                />
              </div>
            </div>
          </div>
        )}

        {loading && <TableSkeleton rows={8} columns={6} />}
        <div style={{ display: loading ? 'none' : 'block' }}>
          <table id="daybookTable" className="display responsive nowrap" style={{ width: '100%' }}></table>
        </div>
      </div>

      {showModal && (
        <div className="modal-overlay">
          <div className="modal">
            <div className="modal-header">
              <h3><i className="fas fa-calendar-day"></i> {editingId ? 'Edit Daybook Entry' : 'Add Daybook Entry'}</h3>
              <button className="close-btn" onClick={() => setShowModal(false)}>×</button>
            </div>
            
            <div className="modal-body">
              <div className="form-grid">
                <div className="form-group">
                  <label>Date</label>
                  <input 
                    type="date" 
                    value={formData.date}
                    onChange={(e) => setFormData({...formData, date: e.target.value})}
                  />
                </div>
                
                <div className="form-group">
                  <label>Cash IN</label>
                  <input 
                    type="number" 
                    placeholder="0.00" 
                    value={formData.cash}
                    onChange={(e) => setFormData({...formData, cash: e.target.value})}
                  />
                </div>

                <div className="form-group">
                  <label>Online IN</label>
                  <input 
                    type="number" 
                    placeholder="0.00" 
                    value={formData.online}
                    onChange={(e) => setFormData({...formData, online: e.target.value})}
                  />
                </div>

                <div className="form-group">
                  <label>Expense</label>
                  <input 
                    type="number" 
                    placeholder="0.00" 
                    value={formData.expenses}
                    onChange={(e) => setFormData({...formData, expenses: e.target.value})}
                  />
                </div>
              </div>

              <div className="form-group" style={{ marginTop: '10px' }}>
                <label>Total Sale (Calculated)</label>
                <input 
                  type="text" 
                  readOnly 
                  value={`${currencySymbol} ${calculateTotal(formData.cash, formData.online, formData.expenses).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`}
                  style={{ backgroundColor: '#f5f5f5', fontWeight: 'bold', color: 'var(--navy-primary)' }}
                />
              </div>

              <div className="form-actions">
                <button className="btn btn-primary" onClick={handleSave}>
                  {editingId ? 'Update Entry' : 'Save Entry'}
                </button>
                <button className="btn btn-secondary" onClick={() => setShowModal(false)}>Cancel</button>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

    // ============== Party Ledger View ==============
    function PartyLedgerView({ currentUser, role, currencySymbol = 'Rs.' }) {
      const [loading, setLoading] = useState(true);
      const [ledgerEntries, setLedgerEntries] = useState([]);
      const [parties, setParties] = useState([]);
      const [showModal, setShowModal] = useState(false);
      const [editingEntry, setEditingEntry] = useState(null);
      const tableInstanceRef = useRef(null);

      // Filter states
      const [filters, setFilters] = useState({
        search: '',
        dateFrom: '',
        dateTo: '',
        partyId: '',
        transactionType: '',
        paymentMode: ''
      });

      useEffect(() => {
        loadParties();
        loadLedgerEntries();

        return () => {
          if (tableInstanceRef.current) {
            try {
              tableInstanceRef.current.destroy();
              tableInstanceRef.current = null;
            } catch (e) {
              console.log('DataTable cleanup error:', e);
            }
          }
        };
      }, []);

      const loadParties = () => {
        google.script.run
          .withSuccessHandler((result) => {
            if (result.success) {
              setParties(result.data);
            }
          })
          .withFailureHandler((err) => {
            console.error('Error loading parties:', err.message);
          })
          .getAllParties(currentUser, role);
      };

      const loadLedgerEntries = () => {
        setLoading(true);
        google.script.run
          .withSuccessHandler((result) => {
            setLoading(false);
            if (result.success) {
              setLedgerEntries(result.data);
              setTimeout(() => initializeDataTable(result.data), 150);
            } else {
              Swal.fire({ icon: 'error', title: 'Error', text: result.message });
            }
          })
          .withFailureHandler((err) => {
            setLoading(false);
            Swal.fire({ icon: 'error', title: 'Error', text: err.message });
          })
          .getPartyLedgerEntries('', currentUser, role);
      };

      const initializeDataTable = (data) => {
        if (tableInstanceRef.current) {
          try {
            tableInstanceRef.current.destroy();
            tableInstanceRef.current = null;
            $('#ledgerTable').empty();
          } catch (e) {
            console.log('DataTable destroy error:', e);
          }
        }

        setTimeout(() => {
          try {
            const table = $('#ledgerTable').DataTable({
              data: data,
              destroy: true,
              columns: [
                { data: 'LedgerID', title: 'ID', width: '50px' },
                {
                  data: 'TransactionDate',
                  title: 'Date',
                  width: '120px',
                  render: (d) => {
                    const date = new Date(d);
                    return date.toLocaleDateString('en-US', {
                      year: 'numeric',
                      month: 'short',
                      day: '2-digit'
                    });
                  }
                },
                { data: 'PartyName', title: 'Party Name', width: '150px' },
                { data: 'InvoiceNo', title: 'Invoice No', width: '110px' },
                {
                  data: 'DebitAmount',
                  title: 'Debit',
                  width: '100px',
                  className: 'dt-right',
                  render: (d) => d > 0 ? `<span style="color: #34a853; font-weight: 600;">${currencySymbol} ${parseFloat(d).toFixed(2)}</span>` : '-'
                },
                {
                  data: 'CreditAmount',
                  title: 'Credit',
                  width: '100px',
                  className: 'dt-right',
                  render: (d) => d > 0 ? `<span style="color: #ea4335; font-weight: 600;">${currencySymbol} ${parseFloat(d).toFixed(2)}</span>` : '-'
                },
                {
                  data: 'RunningBalance',
                  title: 'Balance',
                  width: '120px',
                  className: 'dt-right',
                  render: (d) => {
                    const balance = parseFloat(d);
                    const color = balance >= 0 ? '#34a853' : '#ea4335';
                    return `<span style="color: ${color}; font-weight: 700;">${currencySymbol} ${balance.toFixed(2)}</span>`;
                  }
                },
                { data: 'TransactionType', title: 'Type', width: '90px' },
                { data: 'PaymentMode', title: 'Payment', width: '90px' },
                { data: 'ReferenceNo', title: 'Ref No', width: '100px' },
                {
                  data: null,
                  title: 'Actions',
                  orderable: false,
                  width: '90px',
                  render: () => `
                    <button class="action-icon edit-icon" data-action="edit">
                      <i class="fas fa-edit"></i>
                    </button>
                    <button class="action-icon delete-icon" data-action="delete">
                      <i class="fas fa-trash"></i>
                    </button>
                  `
                }
              ],
              pageLength: 10,
              lengthMenu: [[10, 25, 50, 100, -1], [10, 25, 50, 100, "All"]],
              responsive: true,
              dom: 'Blfrtip',
              buttons: [
                {
                  extend: 'csv',
                  text: '<i class="fas fa-file-csv"></i> CSV',
                  exportOptions: { columns: ':not(:last-child)' }
                },
                {
                  extend: 'pdf',
                  text: '<i class="fas fa-file-pdf"></i> PDF',
                  exportOptions: { columns: ':not(:last-child)' }
                },
                {
                  extend: 'print',
                  text: '<i class="fas fa-print"></i> Print',
                  exportOptions: { columns: ':not(:last-child)' }
                }
              ],
              order: [[0, 'desc']]
            });

            $('#ledgerTable').off('click', '.action-icon');
            $('#ledgerTable').on('click', '.action-icon', function () {
              const action = $(this).data('action');
              const rowData = table.row($(this).parents('tr')).data();
              if (action === 'edit') {
                setEditingEntry(rowData);
                setShowModal(true);
              } else if (action === 'delete') {
                handleDelete(rowData);
              }
            });

            tableInstanceRef.current = table;
          } catch (e) {
            console.error('DataTable initialization error:', e);
            Swal.fire({
              icon: 'error',
              title: 'Error',
              text: 'Failed to initialize table: ' + e.message
            });
          }
        }, 150);
      };

      const applyFilters = () => {
        if (!tableInstanceRef.current) return;

        // Clear previous filters
        tableInstanceRef.current.search('').columns().search('').draw();
        $.fn.dataTable.ext.search.pop();

        // Global search
        if (filters.search) {
          tableInstanceRef.current.search(filters.search).draw(false);
        }

        // Date range filter
        if (filters.dateFrom || filters.dateTo) {
          $.fn.dataTable.ext.search.push(function (settings, data, dataIndex) {
            const timestamp = ledgerEntries[dataIndex]?.TransactionDate;
            if (!timestamp) return true;

            const recordDate = new Date(timestamp);
            const fromDate = filters.dateFrom ? new Date(filters.dateFrom) : null;
            const toDate = filters.dateTo ? new Date(filters.dateTo + 'T23:59:59') : null;

            if (fromDate && recordDate < fromDate) return false;
            if (toDate && recordDate > toDate) return false;
            return true;
          });
        }

        // Party filter
        if (filters.partyId) {
          tableInstanceRef.current.column(2).search(
            parties.find(p => p.PartyID == filters.partyId)?.PartyName || ''
          ).draw(false);
        }

        // Transaction Type filter
        if (filters.transactionType) {
          tableInstanceRef.current.column(7).search(filters.transactionType).draw(false);
        }

        // Payment Mode filter
        if (filters.paymentMode) {
          tableInstanceRef.current.column(8).search(filters.paymentMode).draw(false);
        }

        tableInstanceRef.current.draw();
      };

      const clearFilters = () => {
        setFilters({
          search: '',
          dateFrom: '',
          dateTo: '',
          partyId: '',
          transactionType: '',
          paymentMode: ''
        });
        if (tableInstanceRef.current) {
          $.fn.dataTable.ext.search.pop();
          tableInstanceRef.current.search('').columns().search('').draw();
        }
      };

      useEffect(() => {
        if (tableInstanceRef.current && ledgerEntries.length > 0) {
          applyFilters();
        }
      }, [filters, tableInstanceRef.current]);

      const handleSave = (entryData) => {
        const action = editingEntry ? 'updatePartyLedgerEntry' : 'addPartyLedgerEntry';
        const params = editingEntry
          ? [editingEntry.LedgerID, entryData, currentUser]
          : [entryData, currentUser];

        google.script.run
          .withSuccessHandler((result) => {
            if (result.success) {
              setShowModal(false);
              setEditingEntry(null);
              Swal.fire({
                icon: 'success',
