                title: 'Success!',
                text: result.message,
                timer: 2000,
                showConfirmButton: false
              });
              setTimeout(() => loadLedgerEntries(), 100);
            } else {
              Swal.fire({ icon: 'error', title: 'Error', text: result.message });
            }
          })
          .withFailureHandler((err) => {
            Swal.fire({ icon: 'error', title: 'Error', text: err.message });
          })
          [action](...params);
      };

      const handleDelete = (entry) => {
        Swal.fire({
          icon: 'warning',
          title: 'Delete Entry?',
          text: 'This cannot be undone',
          showCancelButton: true,
          confirmButtonColor: '#ea4335',
          confirmButtonText: 'Delete'
        }).then((result) => {
          if (result.isConfirmed) {
            google.script.run
              .withSuccessHandler((r) => {
                if (r.success) {
                  Swal.fire({
                    icon: 'success',
                    text: r.message,
                    timer: 2000,
                    showConfirmButton: false
                  });
                  setTimeout(() => loadLedgerEntries(), 100);
                } else {
                  Swal.fire({ icon: 'error', title: 'Error', text: r.message });
                }
              })
              .withFailureHandler((err) => {
                Swal.fire({ icon: 'error', title: 'Error', text: err.message });
              })
              .deletePartyLedgerEntry(entry.LedgerID, currentUser);
          }
        });
      };

      return (
        <div className="data-section">
          <div className="section-header">
            <h2>
              <i className="fas fa-book"></i> Party Ledger
            </h2>
            <div style={{display: 'flex', gap: '10px'}}>
              <button
                className="btn btn-primary"
                onClick={loadLedgerEntries}
                disabled={loading}
                title="Refresh Data"
              >
                <i className={`fas fa-sync-alt ${loading ? 'fa-spin' : ''}`}></i> Refresh
              </button>
              <button
                className="btn btn-success"
                onClick={() => {
                  setEditingEntry(null);
                  setShowModal(true);
                }}
              >
                <i className="fas fa-plus"></i> Add Entry
              </button>
            </div>
          </div>

          {!loading && (
            <div className="filters-section">
              <div className="filters-header">
                <h3>
                  <i className="fas fa-filter"></i> Filters
                </h3>
                <button className="btn btn-secondary btn-sm" onClick={clearFilters}>
                  <i className="fas fa-times-circle"></i> Clear All
                </button>
              </div>
              <div className="filters-grid">
                <div className="filter-group">
                  <label>
                    <i className="fas fa-search"></i> Search
                  </label>
                  <input
                    type="text"
                    value={filters.search}
                    onChange={(e) => setFilters({ ...filters, search: e.target.value })}
                    placeholder="Search..."
                    className="filter-input"
                  />
                </div>
                <div className="filter-group">
                  <label>
                    <i className="fas fa-calendar-alt"></i> Date From
                  </label>
                  <input
                    type="date"
                    value={filters.dateFrom}
                    onChange={(e) => setFilters({ ...filters, dateFrom: e.target.value })}
                    className="filter-input"
                  />
                </div>
                <div className="filter-group">
                  <label>
                    <i className="fas fa-calendar-alt"></i> Date To
                  </label>
                  <input
                    type="date"
                    value={filters.dateTo}
                    onChange={(e) => setFilters({ ...filters, dateTo: e.target.value })}
                    className="filter-input"
                  />
                </div>
                <div className="filter-group">
                  <label>
                    <i className="fas fa-user-tie"></i> Party
                  </label>
                  <select
                    value={filters.partyId}
                    onChange={(e) => setFilters({ ...filters, partyId: e.target.value })}
                    className="filter-input"
                  >
                    <option value="">All Parties</option>
                    {parties.map((party) => (
                      <option key={party.PartyID} value={party.PartyID}>
                        {party.PartyName}
                      </option>
                    ))}
                  </select>
                </div>
                <div className="filter-group">
                  <label>
                    <i className="fas fa-exchange-alt"></i> Transaction Type
                  </label>
                  <select
                    value={filters.transactionType}
                    onChange={(e) => setFilters({ ...filters, transactionType: e.target.value })}
                    className="filter-input"
                  >
                    <option value="">All Types</option>
                    <option value="Sale">Sale</option>
                    <option value="Purchase">Purchase</option>
                    <option value="Payment">Payment</option>
                    <option value="Receipt">Receipt</option>
                    <option value="Opening">Opening</option>
                  </select>
                </div>
                <div className="filter-group">
                  <label>
                    <i className="fas fa-credit-card"></i> Payment Mode
                  </label>
                  <select
                    value={filters.paymentMode}
                    onChange={(e) => setFilters({ ...filters, paymentMode: e.target.value })}
                    className="filter-input"
                  >
                    <option value="">All Modes</option>
                    <option value="Cash">Cash</option>
                    <option value="Bank">Bank</option>
                    <option value="Cheque">Cheque</option>
                    <option value="Online">Online</option>
                    <option value="Credit">Credit</option>
                  </select>
                </div>
              </div>
            </div>
          )}

          {loading && <TableSkeleton rows={8} columns={11} />}
          <div style={{ display: loading ? 'none' : 'block' }}>
            <table id="ledgerTable" className="display" style={{ width: '100%' }}></table>
          </div>

          {showModal && (
            <PartyLedgerModal
              entry={editingEntry}
              parties={parties}
              currencySymbol={currencySymbol}
              onClose={() => {
                setShowModal(false);
                setEditingEntry(null);
              }}
              onSave={handleSave}
            />
          )}
        </div>
      );
    }

    // ============== Party Ledger Modal ==============
    function PartyLedgerModal({ entry, parties, currencySymbol = 'Rs.', onClose, onSave }) {
      const [formData, setFormData] = useState({
        TransactionDate: entry?.TransactionDate
          ? new Date(entry.TransactionDate).toISOString().slice(0, 10)
          : new Date().toISOString().slice(0, 10),
        PartyID: entry?.PartyID || '',
        InvoiceNo: entry?.InvoiceNo || '',
        DebitAmount: entry?.DebitAmount || '',
        CreditAmount: entry?.CreditAmount || '',
        TransactionType: entry?.TransactionType || 'Sale',
        PaymentMode: entry?.PaymentMode || 'Cash',
        Narration: entry?.Narration || '',
        ReferenceNo: entry?.ReferenceNo || '',
        CashBookID: entry?.CashBookID || '',
        IsCashEntry: entry?.IsCashEntry || false
      });
      const [saving, setSaving] = useState(false);

      const handleSubmit = (e) => {
        e.preventDefault();

        // Validate that either debit or credit has a value
        const debit = parseFloat(formData.DebitAmount) || 0;
        const credit = parseFloat(formData.CreditAmount) || 0;

        if (debit === 0 && credit === 0) {
          Swal.fire({
            icon: 'warning',
            title: 'Validation Error',
            text: 'Please enter either Debit or Credit amount'
          });
          return;
        }

        if (debit > 0 && credit > 0) {
          Swal.fire({
            icon: 'warning',
            title: 'Validation Error',
            text: 'Cannot have both Debit and Credit in same entry'
          });
          return;
        }

        setSaving(true);
        onSave(formData);
      };

      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal" onClick={(e) => e.stopPropagation()}>
            <div className="modal-header">
              <h3>
                <i className="fas fa-book"></i> {entry ? 'Edit' : 'Add'} Ledger Entry
              </h3>
              <button className="close-btn" onClick={onClose}>
                <i className="fas fa-times"></i>
              </button>
            </div>
            <div className="modal-body">
              <form onSubmit={handleSubmit}>
                <div className="form-grid">
                  <div className="form-group">
                    <label>Transaction Date *</label>
                    <input
                      type="date"
                      value={formData.TransactionDate}
                      onChange={(e) =>
                        setFormData({ ...formData, TransactionDate: e.target.value })
                      }
                      required
                    />
                  </div>

                  <div className="form-group">
                    <label>Select Party *</label>
                    <select
                      value={formData.PartyID}
                      onChange={(e) => setFormData({ ...formData, PartyID: e.target.value })}
                      required
                    >
                      <option value="">-- Select Party --</option>
                      {parties.map((party) => (
                        <option key={party.PartyID} value={party.PartyID}>
                          {party.PartyName} ({party.PartyType})
                        </option>
                      ))}
                    </select>
                  </div>

                  <div className="form-group">
                    <label>Transaction Type *</label>
                    <select
                      value={formData.TransactionType}
                      onChange={(e) =>
                        setFormData({ ...formData, TransactionType: e.target.value })
                      }
                      required
                    >
                      <option value="Sale">Sale</option>
                      <option value="Purchase">Purchase</option>
                      <option value="Payment">Payment</option>
                      <option value="Receipt">Receipt</option>
                      <option value="Opening">Opening</option>
                    </select>
                  </div>

                  <div className="form-group">
                    <label>Payment Mode *</label>
                    <select
                      value={formData.PaymentMode}
                      onChange={(e) => setFormData({ ...formData, PaymentMode: e.target.value })}
                      required
                    >
                      <option value="Cash">Cash</option>
                      <option value="Bank">Bank</option>
                      <option value="Cheque">Cheque</option>
                      <option value="Online">Online</option>
                      <option value="Credit">Credit</option>
                    </select>
                  </div>

                  <div className="form-group">
                    <label>Invoice No</label>
                    <input
                      type="text"
                      value={formData.InvoiceNo}
                      onChange={(e) => setFormData({ ...formData, InvoiceNo: e.target.value })}
                      placeholder="INV-2025-001"
                    />
                  </div>

                  <div className="form-group">
                    <label>Reference No</label>
                    <input
                      type="text"
                      value={formData.ReferenceNo}
                      onChange={(e) => setFormData({ ...formData, ReferenceNo: e.target.value })}
                      placeholder="CHQ-123 / TXN-456"
                    />
                  </div>

                  <div className="form-group">
                    <label>Debit Amount ({currencySymbol})</label>
                    <input
                      type="number"
                      step="0.01"
                      min="0"
                      value={formData.DebitAmount}
                      onChange={(e) => {
                        setFormData({ ...formData, DebitAmount: e.target.value, CreditAmount: '' });
                      }}
                      placeholder="0.00"
                    />
                  </div>

                        <i className="fas fa-save"></i> Save

            </div>

    // ============== Daily Summary View ==============
    function DailySummaryView({ currentUser, role, currencySymbol = 'Rs.' }) {
      const [loading, setLoading] = useState(true);
      const [summaries, setSummaries] = useState([]);
      const tableInstanceRef = useRef(null);

      // Filter states
      const [filters, setFilters] = useState({
        search: '',
        dateFrom: '',
        dateTo: ''
      });

      useEffect(() => {
        loadSummaries();

        return () => {
          if (tableInstanceRef.current) {
            try {
              tableInstanceRef.current.destroy();
              tableInstanceRef.current = null;
            } catch (e) {
              console.log('DataTable cleanup error:', e);
            }
          }
        };
      }, []);

      const loadSummaries = () => {
        setLoading(true);
        google.script.run
          .withSuccessHandler((result) => {
            setLoading(false);
            if (result.success) {
              setSummaries(result.data);
              setTimeout(() => initializeDataTable(result.data), 150);
            } else {
              Swal.fire({ icon: 'error', title: 'Error', text: result.message });
            }
          })
          .withFailureHandler((err) => {
            setLoading(false);
            Swal.fire({ icon: 'error', title: 'Error', text: err.message });
          })
          .getDailySummaries(currentUser, role);
      };

      const initializeDataTable = (data) => {
        if (tableInstanceRef.current) {
          try {
            tableInstanceRef.current.destroy();
            tableInstanceRef.current = null;
            $('#summaryTable').empty();
          } catch (e) {
            console.log('DataTable destroy error:', e);
          }
        }

        setTimeout(() => {
          try {
            const table = $('#summaryTable').DataTable({
              data: data,
              destroy: true,
              columns: [
                { data: 'SummaryID', title: 'ID', width: '50px' },
                {
                  data: 'SummaryDate',
                  title: 'Date',
                  width: '120px',
                  render: (d) => {
                    const date = new Date(d);
                    return date.toLocaleDateString('en-US', {
                      year: 'numeric',
                      month: 'short',
                      day: '2-digit'
                    });
                  }
                },
                {
                  data: 'OpeningBalance',
                  title: 'Opening',
                  width: '120px',
                  className: 'dt-right',
                  render: (d) => {
                    const balance = parseFloat(d);
                    const color = balance >= 0 ? '#34a853' : '#ea4335';
                    return `<span style="color: ${color}; font-weight: 600;">${currencySymbol} ${balance.toFixed(2)}</span>`;
                  }
                },
                {
                  data: 'TotalCashIn',
                  title: 'Cash In',
                  width: '120px',
                  className: 'dt-right',
                  render: (d) => `<span style="color: #34a853; font-weight: 600;">${currencySymbol} ${parseFloat(d).toFixed(2)}</span>`
                },
                {
                  data: 'TotalCashOut',
                  title: 'Cash Out',
                  width: '120px',
                  className: 'dt-right',
                  render: (d) => `<span style="color: #ea4335; font-weight: 600;">${currencySymbol} ${parseFloat(d).toFixed(2)}</span>`
                },
                {
                  data: 'ClosingBalance',
                  title: 'Closing',
                  width: '120px',
                  className: 'dt-right',
                  render: (d) => {
                    const balance = parseFloat(d);
                    const color = balance >= 0 ? '#34a853' : '#ea4335';
                    return `<span style="color: ${color}; font-weight: 700;">${currencySymbol} ${balance.toFixed(2)}</span>`;
                  }
                },
                {
                  data: 'TotalTransactions',
                  title: 'Transactions',
                  width: '100px',
                  className: 'dt-center',
                  render: (d) => `<span style="background: var(--navy-primary); color: white; padding: 4px 12px; border-radius: 3px; font-weight: 600;">${d}</span>`
                },
                {
                  data: null,
                  title: 'Actions',
                  orderable: false,
                  width: '70px',
                  render: () => `
                    <button class="action-icon delete-icon" data-action="delete">
                      <i class="fas fa-trash"></i>
                    </button>
                  `
                }
              ],
              pageLength: 10,
              lengthMenu: [[10, 25, 50, 100, -1], [10, 25, 50, 100, "All"]],
              responsive: true,
              dom: 'Blfrtip',
              buttons: [
                {
                  extend: 'csv',
                  text: '<i class="fas fa-file-csv"></i> CSV',
                  exportOptions: { columns: ':not(:last-child)' }
                },
                {
                  extend: 'pdf',
                  text: '<i class="fas fa-file-pdf"></i> PDF',
                  exportOptions: { columns: ':not(:last-child)' }
                },
                {
                  extend: 'print',
                  text: '<i class="fas fa-print"></i> Print',
                  exportOptions: { columns: ':not(:last-child)' }
                }
              ],
              order: [[0, 'desc']]
            });

            $('#summaryTable').off('click', '.action-icon');
            $('#summaryTable').on('click', '.action-icon', function () {
              const action = $(this).data('action');
              const rowData = table.row($(this).parents('tr')).data();
              if (action === 'delete') {
                handleDelete(rowData);
              }
            });

            tableInstanceRef.current = table;
          } catch (e) {
            console.error('DataTable initialization error:', e);
            Swal.fire({
              icon: 'error',
              title: 'Error',
              text: 'Failed to initialize table: ' + e.message
            });
          }
        }, 150);
      };

      const applyFilters = () => {
        if (!tableInstanceRef.current) return;

        // Clear previous filters
        tableInstanceRef.current.search('').columns().search('').draw();
        $.fn.dataTable.ext.search.pop();

        // Global search
        if (filters.search) {
          tableInstanceRef.current.search(filters.search).draw(false);
        }

        // Date range filter
        if (filters.dateFrom || filters.dateTo) {
          $.fn.dataTable.ext.search.push(function (settings, data, dataIndex) {
            const timestamp = summaries[dataIndex]?.SummaryDate;
            if (!timestamp) return true;

            const recordDate = new Date(timestamp);
            const fromDate = filters.dateFrom ? new Date(filters.dateFrom) : null;
            const toDate = filters.dateTo ? new Date(filters.dateTo + 'T23:59:59') : null;

            if (fromDate && recordDate < fromDate) return false;
            if (toDate && recordDate > toDate) return false;
            return true;
          });
        }

        tableInstanceRef.current.draw();
      };

      const clearFilters = () => {
        setFilters({
          search: '',
          dateFrom: '',
          dateTo: ''
        });
        if (tableInstanceRef.current) {
          $.fn.dataTable.ext.search.pop();
          tableInstanceRef.current.search('').columns().search('').draw();
        }
      };

      useEffect(() => {
        if (tableInstanceRef.current && summaries.length > 0) {
          applyFilters();
        }
      }, [filters, tableInstanceRef.current]);

      const handleRegenerateAll = () => {
        Swal.fire({
          icon: 'question',
          title: 'Regenerate All Summaries?',
          text: 'This will recalculate all daily summaries from Cash Book data',
          showCancelButton: true,
          confirmButtonColor: 'var(--navy-primary)',
          confirmButtonText: 'Regenerate'
        }).then((result) => {
          if (result.isConfirmed) {
            Swal.fire({
              title: 'Regenerating...',
              text: 'Please wait while summaries are being generated',
              allowOutsideClick: false,
              didOpen: () => Swal.showLoading()
            });

            google.script.run
              .withSuccessHandler((r) => {
                Swal.close();
                if (r.success) {
                  Swal.fire({
                    icon: 'success',
                    title: 'Success!',
                    text: r.message,
                    timer: 2000,
                    showConfirmButton: false
                  });
                  setTimeout(() => loadSummaries(), 100);
                } else {
                  Swal.fire({ icon: 'error', title: 'Error', text: r.message });
                }
              })
              .withFailureHandler((err) => {
                Swal.close();
                Swal.fire({ icon: 'error', title: 'Error', text: err.message });
              })
              .regenerateAllSummaries(currentUser);
          }
        });
      };

      const handleDelete = (summary) => {
        Swal.fire({
          icon: 'warning',
          title: 'Delete Summary?',
          text: 'This cannot be undone',
          showCancelButton: true,
          confirmButtonColor: '#ea4335',
          confirmButtonText: 'Delete'
        }).then((result) => {
          if (result.isConfirmed) {
            google.script.run
              .withSuccessHandler((r) => {
                if (r.success) {
                  Swal.fire({
                    icon: 'success',
                    text: r.message,
                    timer: 2000,
                    showConfirmButton: false
                  });
                  setTimeout(() => loadSummaries(), 100);
                } else {
                  Swal.fire({ icon: 'error', title: 'Error', text: r.message });
                }
              })
              .withFailureHandler((err) => {
                Swal.fire({ icon: 'error', title: 'Error', text: err.message });
              })
              .deleteDailySummary(summary.SummaryID, currentUser);
          }
        });
      };

      return (
        <div className="data-section">
          <div className="section-header">
            <h2>
              <i className="fas fa-calendar-check"></i> Daily Cash Summary
            </h2>
            <div style={{display: 'flex', gap: '10px'}}>
              <button
                className="btn btn-primary"
                onClick={loadSummaries}
                disabled={loading}
                title="Refresh Data"
              >
                <i className={`fas fa-sync-alt ${loading ? 'fa-spin' : ''}`}></i> Refresh
              </button>
              <button className="btn btn-primary" onClick={handleRegenerateAll}>
                <i className="fas fa-sync"></i> Regenerate All
              </button>
            </div>
          </div>

          {!loading && (
            <div className="filters-section">
              <div className="filters-header">
                <h3>
                  <i className="fas fa-filter"></i> Filters
                </h3>
                <button className="btn btn-secondary btn-sm" onClick={clearFilters}>
                  <i className="fas fa-times-circle"></i> Clear All
                </button>
              </div>
              <div className="filters-grid">
                <div className="filter-group">
                  <label>
                    <i className="fas fa-search"></i> Search
                  </label>
                  <input
                    type="text"
                    value={filters.search}
                    onChange={(e) => setFilters({ ...filters, search: e.target.value })}
                    placeholder="Search..."
                    className="filter-input"
                  />
                </div>
                <div className="filter-group">
                  <label>
                    <i className="fas fa-calendar-alt"></i> Date From
                  </label>
                  <input
                    type="date"
                    value={filters.dateFrom}
                    onChange={(e) => setFilters({ ...filters, dateFrom: e.target.value })}
                    className="filter-input"
                  />
                </div>
                <div className="filter-group">
                  <label>
                    <i className="fas fa-calendar-alt"></i> Date To
                  </label>
                  <input
                    type="date"
                    value={filters.dateTo}
                    onChange={(e) => setFilters({ ...filters, dateTo: e.target.value })}
                    className="filter-input"
                  />
                </div>
              </div>
            </div>
          )}

          {loading && <TableSkeleton rows={8} columns={8} />}
          <div style={{ display: loading ? 'none' : 'block' }}>
            <table id="summaryTable" className="display" style={{ width: '100%' }}></table>
          </div>
        </div>
      );
    }

    // ============== My Account (User Profile) ==============
    function AccountView({ currentUser, currentEmail, role }) {

        Email: currentEmail || '',
        CurrentPassword: '',
        NewPassword: '',
        ConfirmPassword: ''
      });
      const [saving, setSaving] = useState(false);

      const handleSubmit = (e) => {
        e.preventDefault();

        if (formData.NewPassword && formData.NewPassword !== formData.ConfirmPassword) {
          Swal.fire({ icon: 'error', title: 'Error', text: 'New passwords do not match!' });
          return;
        }

        setSaving(true);
        google.script.run
          .withSuccessHandler((result) => {
            setSaving(false);
            if (result.success) {
              Swal.fire({
                icon: 'success',
                title: 'Success!',
                text: result.message,
                timer: 2000,
                showConfirmButton: false
              });
              setFormData({
                ...formData,
                CurrentPassword: '',
                NewPassword: '',
                ConfirmPassword: ''
              });
            } else {
              Swal.fire({ icon: 'error', title: 'Error', text: result.message });
            }
          })
          .withFailureHandler((err) => {
            setSaving(false);
            Swal.fire({ icon: 'error', title: 'Error', text: err.message });
          })
          .updateMyAccount(currentUser, formData);
      };

      return (
        <div className="profile-section">
          <div className="profile-header">
            <div className="profile-avatar">
              {currentUser.charAt(0).toUpperCase()}
            </div>
            <div className="profile-info">
              <h2>{currentUser}</h2>
              <p>{role} Account</p>
            </div>
          </div>

          <form onSubmit={handleSubmit}>
            <div className="form-group">
              <label>Username (Cannot be changed)</label>
              <input
                type="text"
                value={currentUser}
                disabled
                style={{background: '#f5f5f5', cursor: 'not-allowed'}}
              />
            </div>

            <div className="form-group">
              <label>Email *</label>
              <input
                type="email"
                value={formData.Email}
                onChange={(e) => setFormData({...formData, Email: e.target.value})}
                required
              />
            </div>

            <hr style={{margin: '25px 0', border: 'none', borderTop: '2px solid #e0e0e0'}} />

            <h3 style={{color: 'var(--navy-primary)', marginBottom: '18px', fontSize: '18px'}}>
              <i className="fas fa-lock"></i> Change Password
            </h3>

            <div className="form-group">
              <label>Current Password *</label>
              <input
                type="password"
                value={formData.CurrentPassword}
                onChange={(e) => setFormData({...formData, CurrentPassword: e.target.value})}
                required
                autoComplete="current-password"
              />
            </div>

            <div className="form-group">
              <label>New Password (Leave blank to keep current)</label>
              <input
                type="password"
                value={formData.NewPassword}
                onChange={(e) => setFormData({...formData, NewPassword: e.target.value})}
                autoComplete="new-password"
              />
            </div>

            <div className="form-group">
              <label>Confirm New Password</label>
              <input
                type="password"
                value={formData.ConfirmPassword}
                onChange={(e) => setFormData({...formData, ConfirmPassword: e.target.value})}
                autoComplete="new-password"
              />
            </div>

            <div className="form-actions">
              <button type="submit" className="btn btn-primary" disabled={saving}>
                {saving ? (
                  <><i className="fas fa-spinner fa-spin"></i> Saving...</>
                ) : (
                  <><i className="fas fa-save"></i> Update Account</>
                )}
              </button>
            </div>
          </form>
        </div>
      );
    }

    // ============== Settings Page ==============
    function SettingsView({ currentUser, role, onSettingsUpdate, onCurrencyUpdate }) {
      const [uploading, setUploading] = useState(false);
      const [customColors, setCustomColors] = useState({
        primary: '#001f3f',
        accent: '#0074D9',
        text: '#333333'
      });
      const [systemSettings, setSystemSettings] = useState({
        currency: 'PKR',
        currencySymbol: 'Rs.',
        systemName: 'Cash Book System'
      });
      const [savingSettings, setSavingSettings] = useState(false);
      const fileInputRef = useRef(null);
      const isAdmin = role === 'Admin';

      useEffect(() => {
        // Load user settings
        google.script.run
          .withSuccessHandler((result) => {
            if (result.success && result.settings) {
              if (result.settings.customColors) {
                try {
                  const colors = JSON.parse(result.settings.customColors);
                  setCustomColors(colors);
                } catch (e) {}
              }
            }
          })
          .withFailureHandler((err) => {
            console.error('Failed to load user settings:', err);
          })
          .getUserSettings(currentUser);

        // Load system settings (admin only)
        if (isAdmin) {
          google.script.run
            .withSuccessHandler((result) => {
              if (result.success && result.data) {
                setSystemSettings(result.data);
              }
            })
            .withFailureHandler((err) => {
              console.error('Failed to load system settings:', err);
            })
            .getSystemSettings();
        }
      }, []);

      const handleImageUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        if (!file.type.startsWith('image/')) {
          Swal.fire({ icon: 'error', title: 'Error', text: 'Please select an image file' });
          return;
        }

        const reader = new FileReader();
        reader.onload = (event) => {
          setUploading(true);
          const base64Data = event.target.result;

          google.script.run
            .withSuccessHandler((result) => {
              setUploading(false);
              if (result.success) {
                google.script.run
                  .withSuccessHandler((r) => {
                    if (r.success) {
                      Swal.fire({ icon: 'success', title: 'Success!', text: 'Profile image updated!', timer: 2000, showConfirmButton: false });
                      onSettingsUpdate();
                    }
                  })
                  .withFailureHandler((err) => {
                    Swal.fire({ icon: 'error', title: 'Error', text: 'Failed to update profile image: ' + err.message });
                  })
                  .updateUserSettings(currentUser, { profileImage: result.fileUrl });
              } else {
                Swal.fire({ icon: 'error', title: 'Error', text: result.message });
              }
            })
            .withFailureHandler((err) => {
              setUploading(false);
              Swal.fire({ icon: 'error', title: 'Error', text: err.message });
            })
            .uploadProfileImage(base64Data, file.name, currentUser);
        };
        reader.readAsDataURL(file);
      };

      const handleColorChange = (type, color) => {
        setCustomColors({...customColors, [type]: color});
      };

      const applyColors = () => {
        const root = document.documentElement;
        root.style.setProperty('--navy-primary', customColors.primary);
        root.style.setProperty('--navy-accent', customColors.accent);
        root.style.setProperty('--text-primary', customColors.text);

        google.script.run
          .withSuccessHandler((result) => {
            if (result.success) {
              Swal.fire({ icon: 'success', title: 'Success!', text: 'Color scheme applied!', timer: 2000, showConfirmButton: false });
              onSettingsUpdate();
            }
          })
          .withFailureHandler((err) => {
            Swal.fire({ icon: 'error', title: 'Error', text: 'Failed to apply colors: ' + err.message });
          })
          .updateUserSettings(currentUser, { customColors: JSON.stringify(customColors) });
      };

      const resetToDefaultColors = () => {
        const defaultColors = {
          primary: '#001f3f',
          accent: '#0074D9',
          text: '#333333'
        };
        setCustomColors(defaultColors);

        const root = document.documentElement;
        root.style.setProperty('--navy-primary', defaultColors.primary);
        root.style.setProperty('--navy-accent', defaultColors.accent);
        root.style.setProperty('--text-primary', defaultColors.text);

        google.script.run
          .withSuccessHandler((result) => {
            if (result.success) {
              Swal.fire({ icon: 'success', title: 'Reset!', text: 'Colors reset to default Navy Blue theme!', timer: 2000, showConfirmButton: false });
              onSettingsUpdate();
            }
          })
          .withFailureHandler((err) => {
            Swal.fire({ icon: 'error', title: 'Error', text: 'Failed to reset colors: ' + err.message });
          })
          .updateUserSettings(currentUser, { customColors: JSON.stringify(defaultColors) });
      };

      const handleSystemSettingChange = (key, value) => {
        setSystemSettings({...systemSettings, [key]: value});
      };

      const saveSystemSettings = () => {
        setSavingSettings(true);
        google.script.run
          .withSuccessHandler((result) => {
            setSavingSettings(false);
            if (result.success) {
              Swal.fire({
                icon: 'success',
                title: 'Settings Saved!',
                text: 'System settings updated successfully! Currency changes applied across all pages.',
                timer: 3000,
                showConfirmButton: true
              });

              // Update global currency symbol
              if (onCurrencyUpdate) {
                onCurrencyUpdate();
              }

              onSettingsUpdate();
            } else {
              Swal.fire({ icon: 'error', title: 'Error', text: result.message });
            }
          })
          .withFailureHandler((err) => {
            setSavingSettings(false);
            Swal.fire({ icon: 'error', title: 'Error', text: err.message });
          })
          .updateSystemSettings(systemSettings, currentUser, role);
      };

      return (
        <div className="data-section">
          <h2><i className="fas fa-cog"></i> Settings</h2>

          {/* System Settings - Admin Only */}
          {isAdmin && (
            <div style={{marginTop: '25px'}}>
              <h3 style={{marginBottom: '18px', color: 'var(--navy-primary)', fontSize: '17px'}}>
                <i className="fas fa-globe"></i> System Settings <span style={{fontSize: '12px', color: '#ea4335', fontWeight: '700'}}>(Admin Only)</span>
              </h3>

              <div className="form-grid">
                <div className="form-group">
                  <label>Currency Code *</label>
                  <select
                    value={systemSettings.currency}
                    onChange={(e) => {
                      const currency = e.target.value;
                      let symbol = 'Rs.';
                      if (currency === 'USD') symbol = '$';
                      else if (currency === 'EUR') symbol = '€';
                      else if (currency === 'GBP') symbol = '£';
                      else if (currency === 'INR') symbol = '₹';
                      else if (currency === 'PKR') symbol = 'Rs.';
                      else if (currency === 'AED') symbol = 'AED';
                      else if (currency === 'SAR') symbol = 'SAR';

                      handleSystemSettingChange('currency', currency);
                      handleSystemSettingChange('currencySymbol', symbol);
                    }}
                    style={{fontSize: '16px'}}
                  >
                    <option value="PKR">PKR - Pakistani Rupee</option>
                    <option value="USD">USD - US Dollar</option>
                    <option value="EUR">EUR - Euro</option>
                    <option value="GBP">GBP - British Pound</option>
                    <option value="INR">INR - Indian Rupee</option>
                    <option value="AED">AED - UAE Dirham</option>
                    <option value="SAR">SAR - Saudi Riyal</option>
                  </select>
                </div>

                <div className="form-group">
                  <label>Currency Symbol *</label>
                  <input
                    type="text"
                    value={systemSettings.currencySymbol}
                    onChange={(e) => handleSystemSettingChange('currencySymbol', e.target.value)}
                    placeholder="Rs."
                    style={{fontSize: '16px'}}
                  />
                </div>

                <div className="form-group">
                  <label>System Name</label>
                  <input
                    type="text"
                    value={systemSettings.systemName}
                    onChange={(e) => handleSystemSettingChange('systemName', e.target.value)}
                    placeholder="Cash Book System"
                    style={{fontSize: '16px'}}
                  />
                </div>
              </div>

              <button
                className="btn btn-success"
                onClick={saveSystemSettings}
                disabled={savingSettings}
                style={{marginTop: '10px'}}
              >
                {savingSettings ? (
                  <><i className="fas fa-spinner fa-spin"></i> Saving...</>
                ) : (
                  <><i className="fas fa-save"></i> Save System Settings</>
                )}
              </button>

              <hr style={{margin: '30px 0', border: 'none', borderTop: '2px solid #e0e0e0'}} />
            </div>
          )}

          {!isAdmin && (
            <div className="settings-info-message">
              <i className="fas fa-info-circle" style={{marginRight: '6px'}}></i>
              <strong>Note:</strong> System settings and customization are only available to Administrators.
            </div>
          )}

          <div style={{marginTop: '25px'}}>
            <h3 style={{marginBottom: '18px', color: 'var(--navy-primary)', fontSize: '17px'}}>
              <i className="fas fa-image"></i> Profile Picture
            </h3>
            <div style={{marginBottom: '18px'}}>
              <input
                ref={fileInputRef}
                type="file"
                accept="image/*"
                onChange={handleImageUpload}
                style={{display: 'none'}}
              />
              <button
                className="btn btn-primary"
                onClick={() => fileInputRef.current.click()}
                disabled={uploading}
              >
                {uploading ? (
                  <><i className="fas fa-spinner fa-spin"></i> Uploading...</>
                ) : (
                  <><i className="fas fa-upload"></i> Upload Picture</>
                )}
              </button>
              <p style={{marginTop: '10px', fontSize: '13px', color: '#666'}}>
                Upload a new profile picture. Recommended size: 200x200px
              </p>
            </div>
          </div>

          <hr style={{margin: '25px 0', border: 'none', borderTop: '2px solid #e0e0e0'}} />

          <div style={{marginTop: '25px'}}>
            <h3 style={{marginBottom: '18px', color: 'var(--navy-primary)', fontSize: '17px'}}>
              <i className="fas fa-palette"></i> Color Customization
            </h3>
            <div className="form-grid">
              <div className="form-group">
                <label>Primary Color</label>
                <input
                  type="color"
                  value={customColors.primary}
                  onChange={(e) => handleColorChange('primary', e.target.value)}
                  style={{width: '100%', height: '48px', cursor: 'pointer'}}
                />
              </div>
              <div className="form-group">
                <label>Accent Color</label>
                <input
                  type="color"
                  value={customColors.accent}
                  onChange={(e) => handleColorChange('accent', e.target.value)}
                  style={{width: '100%', height: '48px', cursor: 'pointer'}}
                />
              </div>
              <div className="form-group">
                <label>Text Color</label>
                <input
                  type="color"
                  value={customColors.text}
                  onChange={(e) => handleColorChange('text', e.target.value)}
                  style={{width: '100%', height: '48px', cursor: 'pointer'}}
                />
              </div>
            </div>

            <div className="color-preview-section">
              <h4 style={{fontSize: '14px', fontWeight: '600', marginBottom: '5px', color: 'var(--navy-primary)'}}>
                <i className="fas fa-eye"></i> Live Preview
              </h4>
              <p style={{fontSize: '12px', color: '#666', marginBottom: '10px'}}>See how your colors look together</p>
              <div className="color-preview-grid">
                <div className="color-preview-item">
                  <div className="color-preview-box" style={{backgroundColor: customColors.primary}}></div>
                  <div className="color-preview-label">Primary</div>
                  <div className="color-preview-value">{customColors.primary}</div>
                </div>
                <div className="color-preview-item">
                  <div className="color-preview-box" style={{backgroundColor: customColors.accent}}></div>
                  <div className="color-preview-label">Accent</div>
                  <div className="color-preview-value">{customColors.accent}</div>
                </div>
                <div className="color-preview-item">
                  <div className="color-preview-box" style={{backgroundColor: customColors.text}}></div>
                  <div className="color-preview-label">Text</div>
                  <div className="color-preview-value">{customColors.text}</div>
                </div>
              </div>
            </div>

            <div style={{display: 'flex', gap: '10px', marginTop: '18px', flexWrap: 'wrap'}}>
              <button className="btn btn-success" onClick={applyColors}>
                <i className="fas fa-check"></i> Apply Colors
              </button>
              <button className="btn btn-secondary" onClick={resetToDefaultColors}>
                <i className="fas fa-undo"></i> Reset
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ============== Main Content Router ==============
    function MainContent({ activeMenu, user, email, role, currencySymbol, onSettingsUpdate, onCurrencyUpdate }) {
      switch (activeMenu) {
        case 'dashboard':
          return <DashboardView currencySymbol={currencySymbol} />;
        case 'users':
          return <UsersView currentUser={user} />;
        case 'parties':
          return <PartiesView currentUser={user} role={role} />;
        case 'cashbook':
          return <CashBookView currentUser={user} role={role} />;
        case 'daybook':
          return <DaybookView currentUser={user} role={role} currencySymbol={currencySymbol} />;  
        case 'partyledger':
          return <PartyLedgerView currentUser={user} role={role} currencySymbol={currencySymbol} />;
        case 'dailysummary':
          return <DailySummaryView currentUser={user} role={role} currencySymbol={currencySymbol} />;
        case 'vouchersequence':
          return <VoucherSequenceView currentUser={user} role={role} />;
        case 'settings':
          return <SettingsView currentUser={user} role={role} onSettingsUpdate={onSettingsUpdate} onCurrencyUpdate={onCurrencyUpdate} />;
        case 'account':
          return <AccountView currentUser={user} currentEmail={email} role={role} />;
        default:
          return null;
      }
    }

    // ============== Dashboard Layout ==============
    function Dashboard({ user, email, role, profileImage, themeMode, currencySymbol, onThemeToggle, onSettingsUpdate, onCurrencyUpdate, onLogout }) {
      const [activeMenu, setActiveMenu] = useState(role === 'Admin' ? 'dashboard' : 'settings');
      const [collapsed, setCollapsed] = useState(false);
      const [showMobileSidebar, setShowMobileSidebar] = useState(false);

      return (
        <>
          <div className={`sidebar-overlay ${showMobileSidebar ? 'show' : ''}`} onClick={() => setShowMobileSidebar(false)}></div>

          <div className="app-container">
            <Sidebar
              activeMenu={activeMenu}
              setActiveMenu={setActiveMenu}
              role={role}
              user={user}
              profileImage={profileImage}
              themeMode={themeMode}
              onThemeToggle={onThemeToggle}
              onLogout={onLogout}
              collapsed={collapsed}
              setCollapsed={setCollapsed}
              showMobile={showMobileSidebar}
              setShowMobile={setShowMobileSidebar}
            />
            <div className="main-content">
              <div className="header">
                <h1>
                  <i className="fas fa-tachometer-alt"></i> Dashboard
                </h1>
                <div className="header-welcome">Welcome, {user}</div>
              </div>
              <MainContent
                activeMenu={activeMenu}
                user={user}
                email={email}
                role={role}
                currencySymbol={currencySymbol}
                onSettingsUpdate={onSettingsUpdate}
                onCurrencyUpdate={onCurrencyUpdate}
              />
            </div>
          </div>

          <BottomNavigation
            activeMenu={activeMenu}
            setActiveMenu={setActiveMenu}
            role={role}
            setShowMobileSidebar={setShowMobileSidebar}
          />
        </>
      );
    }

    // ============== Main App ==============
    function App() {
      const [isLoggedIn, setIsLoggedIn] = useState(false);
      const [currentUser, setCurrentUser] = useState(null);
      const [currentEmail, setCurrentEmail] = useState(null);
      const [userRole, setUserRole] = useState(null);
      const [profileImage, setProfileImage] = useState('');
      const [themeMode, setThemeMode] = useState('light');
      const [customColors, setCustomColors] = useState('');
      const [currencySymbol, setCurrencySymbol] = useState('Rs.');

      const SESSION_DURATION = 60 * 60 * 1000;

      // Load currency settings globally
      const loadCurrencySettings = () => {
        google.script.run
          .withSuccessHandler((result) => {
            if (result.success && result.data && result.data.currencySymbol) {
              setCurrencySymbol(result.data.currencySymbol);
            }
          })
          .withFailureHandler((err) => {
            console.error('Failed to load currency settings:', err);
          })
          .getSystemSettings();
      };

      const applyTheme = (mode) => {
        if (mode === 'dark') {
          document.body.classList.add('dark-mode');
        } else {
          document.body.classList.remove('dark-mode');
        }
      };

      const applyCustomColors = (colors) => {
        if (colors) {
          try {
            const colorObj = JSON.parse(colors);
            const root = document.documentElement;
            root.style.setProperty('--navy-primary', colorObj.primary);
            root.style.setProperty('--navy-accent', colorObj.accent);
            if (colorObj.text) {
              root.style.setProperty('--text-primary', colorObj.text);
            }
          } catch (e) {}
        }
      };

      useEffect(() => {
        applyTheme(themeMode);
        applyCustomColors(customColors);
      }, [themeMode, customColors]);

      useEffect(() => {
        const checkSession = () => {
          try {
            const session = localStorage.getItem('userSession');
            if (session) {
              const sessionData = JSON.parse(session);
              const currentTime = new Date().getTime();
              const sessionAge = currentTime - sessionData.loginTime;

              if (sessionAge < SESSION_DURATION) {
                setIsLoggedIn(true);
                setCurrentUser(sessionData.username);
                setCurrentEmail(sessionData.email);
                setUserRole(sessionData.role);
                setProfileImage(sessionData.profileImage || '');
                setThemeMode(sessionData.themeMode || 'light');
                setCustomColors(sessionData.customColors || '');

                // Load currency settings on session restore
                loadCurrencySettings();
              } else {
                localStorage.removeItem('userSession');
              }
            }
          } catch (error) {
            console.error('Session check error:', error);
            localStorage.removeItem('userSession');
          }
        };

        checkSession();

        const sessionCheckInterval = setInterval(() => {
          const session = localStorage.getItem('userSession');
          if (session) {
            const sessionData = JSON.parse(session);
            const currentTime = new Date().getTime();
            const sessionAge = currentTime - sessionData.loginTime;

            if (sessionAge >= SESSION_DURATION) {
              localStorage.removeItem('userSession');
              setIsLoggedIn(false);
              setCurrentUser(null);
              setCurrentEmail(null);
              setUserRole(null);
              Swal.fire({
                icon: 'warning',
                title: 'Session Expired',
                text: 'Your session has expired. Please login again.',
                confirmButtonColor: 'var(--navy-primary)'
              });
            }
          }
        }, 60000);

        return () => clearInterval(sessionCheckInterval);
      }, []);

      const handleLogin = (username, role, email, profileImg, theme, colors) => {
        const sessionData = {
          username, role, email,
          profileImage: profileImg || '',
          themeMode: theme || 'light',
          customColors: colors || '',
          loginTime: new Date().getTime()
        };

        localStorage.setItem('userSession', JSON.stringify(sessionData));

        setIsLoggedIn(true);
        setCurrentUser(username);
        setCurrentEmail(email);
        setUserRole(role);
        setProfileImage(profileImg || '');
        setThemeMode(theme || 'light');
        setCustomColors(colors || '');

        // Load currency settings on login
        loadCurrencySettings();
      };

      const handleThemeToggle = () => {
        const newTheme = themeMode === 'light' ? 'dark' : 'light';
        setThemeMode(newTheme);

        google.script.run
          .withSuccessHandler(() => {
            const session = JSON.parse(localStorage.getItem('userSession'));
            session.themeMode = newTheme;
            localStorage.setItem('userSession', JSON.stringify(session));
          })
          .withFailureHandler((err) => {
            console.error('Failed to update theme:', err);
          })
          .updateUserSettings(currentUser, { themeMode: newTheme });
      };

      const handleSettingsUpdate = () => {
        google.script.run
          .withSuccessHandler((result) => {
            if (result.success) {
              const settings = result.settings;
              setProfileImage(settings.profileImage);
              setThemeMode(settings.themeMode);
              setCustomColors(settings.customColors);

              const session = JSON.parse(localStorage.getItem('userSession'));
              session.profileImage = settings.profileImage;
              session.themeMode = settings.themeMode;
              session.customColors = settings.customColors;
              localStorage.setItem('userSession', JSON.stringify(session));
            }
          })
          .withFailureHandler((err) => {
            console.error('Failed to refresh settings:', err);
          })
          .getUserSettings(currentUser);
      };

      const handleLogout = () => {
        Swal.fire({
          icon: 'question',
          title: 'Logout?',
          text: 'Are you sure you want to logout?',
          showCancelButton: true,
          confirmButtonColor: 'var(--navy-primary)',
          confirmButtonText: 'Yes, Logout'
        }).then((result) => {
          if (result.isConfirmed) {
            localStorage.removeItem('userSession');
            setIsLoggedIn(false);
            setCurrentUser(null);
            setCurrentEmail(null);
            setUserRole(null);
            setProfileImage('');
            setThemeMode('light');
            setCustomColors('');
            document.body.classList.remove('dark-mode');

            Swal.fire({
              icon: 'success',
              title: 'Logged Out',
              text: 'You have been logged out successfully.',
              timer: 1500,
              showConfirmButton: false
            });
          }
        });
      };

      return (
        <div>
          {!isLoggedIn ? (
            <LoginPage onLogin={handleLogin} />
          ) : (
            <Dashboard
              user={currentUser}
              email={currentEmail}
              role={userRole}
              profileImage={profileImage}
              themeMode={themeMode}
              currencySymbol={currencySymbol}
              onThemeToggle={handleThemeToggle}
              onSettingsUpdate={handleSettingsUpdate}
              onCurrencyUpdate={loadCurrencySettings}
              onLogout={handleLogout}
            />
          )}
        </div>
      );
    }

    // ============== Render App ==============
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);


    function setEntryMode(mode) {
  // Update hidden input
  document.getElementById('entryMode').value = mode;

  // Visual Toggle
  const btnIn = document.getElementById('btnCashIn');
  const btnOut = document.getElementById('btnCashOut');

  if (mode === 'CASH IN') {
    btnIn.classList.add('active');
    btnOut.classList.remove('active');
  } else {
    btnOut.classList.add('active');
    btnIn.classList.remove('active');
  }
  
  // Optional: Provide haptic feedback for mobile APK users
  if (window.navigator && window.navigator.vibrate) {
    window.navigator.vibrate(10);
  }
}
  </script>
</body>
