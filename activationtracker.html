<style>

:root{

*{

}

html,body{

  font-family:'Plus Jakarta Sans',sans-serif;

body.menu-open{

/* ===== TOPBAR ===== */

.topbar{
  height:70px;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 24px;
  border-bottom:1px solid var(--border-color);

/* ===== LAYOUT ===== */

.layout{
  display:flex;

}

/* ===== SIDEBAR ===== */

.sidebar{
  width:var(--sidebar-width);
  background:#fff;
  border-right:1px solid var(--border-color);
  flex-shrink:0;
  overflow-y:auto;
  position:sticky;
  top:70px;
  transition:all .35s ease;
}

/* ===== CONTENT ===== */

.content{
  flex:1;
  overflow-y:auto;
  padding:32px;
}

/* ===== TABLE ===== */

#tableBody tr{
  transition:all .2s ease;
}

#tableBody tr:hover{
  background:var(--primary-light);
}

/* ===== SIDEBAR OVERLAY ===== */

.sidebar-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.3);
  z-index:1500;
  display:none;
}

.sidebar-overlay.show{
  display:block;
}

/* ===== SCROLLBAR HIDE ===== */

.scrollbar-hide::-webkit-scrollbar{
  display:none;
}

.scrollbar-hide{
  -ms-overflow-style:none;
  scrollbar-width:none;
}

.rotate-icon{
  transition:transform .3s ease;
}

.rotate-180{
  transform:rotate(180deg);
}

.menu-content.hidden{
  display:none;
}

.whitespace-nowrap{
  white-space:nowrap;
}

/* ======================================================
   MOBILE
====================================================== */

@media(max-width:1024px){

  .layout{
    display:block;
    height:auto;
  }

  .sidebar{
    position:fixed;
    left:0;
    bottom:-100%;
    top:auto;
    width:100%;
    height:75vh;

    z-index:2000;

    background:#fff;

  .sidebar.show{
    bottom:0;
  }

  .sidebar::before{
    content:"";
    position:absolute;
    top:12px;
    left:50%;
    transform:translateX(-50%);

    height:5px;
    background:#dbe2ea;
    border-radius:10px;

    flex-direction:column;

    border-radius:18px;

    padding:12px;

/* ===== MOBILE TABLE ===== */

@media(max-width:640px){

  #tableBody{

  }

  #tableBody td::before{

    font-weight:800;
    color:var(--text-muted);
    text-transform:uppercase;
  }

}

<script>

const pageSize = 15;
const CACHE_KEY = 'activation_history_cache';

let masterRows = [];
let filteredRows = [];
let currentPage = 0;
let debounceTimer = null;

/* ================= LOAD ================= */

window.onload = () => {

  const cached = localStorage.getItem(CACHE_KEY);

  if(cached){

    masterRows = JSON.parse(cached);

    populateRetailerDropdown();
    applyFilters();

  }

  loadDashboard();

};

/* ================= SIDEBAR ================= */

function toggleSidebar(){

  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebarOverlay');

  sidebar.classList.toggle('show');
  overlay.classList.toggle('show');

  document.body.classList.toggle('menu-open');

}

function closeSidebar(){

  document.getElementById('sidebar').classList.remove('show');
  document.getElementById('sidebarOverlay').classList.remove('show');
  document.body.classList.remove('menu-open');

}

document.querySelectorAll('.sidebar a').forEach(link => {

  link.addEventListener('click', () => {

    if(window.innerWidth <= 1024){
      closeSidebar();
    }

  });

});

/* ================= ACTIONS ================= */

function toggleActions(){

  const menu = document.getElementById('quickActions');
  const icon = document.getElementById('actionIcon');

  menu.classList.toggle('active');

  icon.innerHTML =
    menu.classList.contains('active')
      ? '✕'
      : '⚙️';

}

function closeActionsMenu(){

  const menu = document.getElementById('quickActions');
  const icon = document.getElementById('actionIcon');

  menu.classList.remove('active');

  if(icon){
    icon.innerHTML = '⚙️';
  }

}

/* ================= DATE ================= */

function parseDate(dateStr){

  if(!dateStr || dateStr === '-') return new Date(0);

  const datePart = dateStr.split(" ")[0];
  const [d,m,y] = datePart.split("-");

  return new Date(y,m-1,d);

}

/* ================= LOAD DATA ================= */

function getDashboardData() {

  try {

    const ss = SpreadsheetApp.openById(ACT_SPREADSHEET_ID);

    const sheet = ss.getSheetByName("Sheet1");

    if (!sheet) {
      return {
        rows: [],
        totalCount: 0,
        error: "Sheet not found"
      };
    }

    const data = sheet.getDataRange().getValues();

    if (data.length < 2) {
      return {
        rows: [],
        totalCount: 0,
        error: "No data"
      };
    }

    const headers = data[0];

    Logger.log(headers);

    const rows = data.slice(1).map(row => {

      return {

        imei:
          row[
            headers.findIndex(h =>
              /imei/i.test(h)
            )
          ] || "-",

        product:
          row[
            headers.findIndex(h =>
              /product/i.test(h)
            )
          ] || "-",

        activated: formatDateValue(
          row[
            headers.findIndex(h =>
              /activ|aciv|date|time/i.test(h)
            )
          ]
        ),

        dms:
          row[
            headers.findIndex(h =>
              /dms/i.test(h)
            )
          ] || "-",

        retailer:
          row[
            headers.findIndex(h =>
              /retailer/i.test(h)
            )
          ] || "-"

      };

    }).reverse();

    return {
      rows: rows,
      totalCount: rows.length
    };

  } catch (e) {

    return {
      rows: [],
      totalCount: 0,
      error: e.toString()
    };

  }

}

function formatDateValue(val) {

  if (val instanceof Date) {

    return Utilities.formatDate(
      val,
      TIMEZONE,
      "dd-MM-yyyy HH:mm"
    );

  }

  return val || "-";

}

/* ================= TABLE ================= */

function renderTable(){

  const start = currentPage * pageSize;

  const paginatedRows =
    filteredRows.slice(start, start + pageSize);

  const tbody =
    document.getElementById("tableBody");

  if(!paginatedRows.length){

    tbody.innerHTML = `
      <tr>
        <td colspan="5"
            class="p-20 text-center text-slate-400 font-medium">
          No records matching your search.
        </td>
      </tr>
    `;

    return;

  }

  tbody.innerHTML = paginatedRows.map(r => {

    const dateOnly =
      r.activated && r.activated.includes(' ')
        ? r.activated.split(' ')[0]
        : (r.activated || '-');

    return `
      <tr class="hover:bg-indigo-50/30 transition-colors">

        <td class="px-8 py-4 text-sm text-slate-500 font-medium">
          ${r.imei || '-'}
        </td>

        <td class="px-8 py-4 text-sm text-slate-900 font-bold">
          ${r.product || '-'}
        </td>

        <td class="px-8 py-4 text-sm text-indigo-600 font-bold text-center">
          ${dateOnly}
        </td>

        <td class="px-8 py-4 text-sm text-slate-500">
          ${r.dms || '-'}
        </td>

        <td class="px-8 py-4 text-sm text-slate-600 font-medium">
          ${r.retailer || '-'}
        </td>

      </tr>
    `;

  }).join('');

  const totalPages =
    Math.ceil(filteredRows.length / pageSize) || 1;

  document.getElementById("pageInfo").innerText =
    `Viewing ${start + 1} - ${Math.min(start + pageSize, filteredRows.length)} of ${filteredRows.length}`;

  document.getElementById("btnPrev").disabled =
    currentPage === 0;

  document.getElementById("btnNext").disabled =
    (currentPage + 1) >= totalPages;

}

/* ================= FILTER ================= */

function applyFilters(){

  const q =
    (document.getElementById("searchIMEI").value || "")
    .toLowerCase();

  const ret =
    document.getElementById("filterRetailer").value;

  const fDate =
    document.getElementById("fromDate").value;

  const tDate =
    document.getElementById("toDate").value;

  filteredRows = masterRows.filter(r => {

    const searchStr =
      `${r.imei} ${r.product} ${r.retailer}`.toLowerCase();

    if(q && !searchStr.includes(q)) return false;

    if(ret && r.retailer !== ret) return false;

    if(fDate || tDate){

      const rowDateObj = parseDate(r.activated);

      const fromObj = fDate
        ? new Date(fDate)
        : null;

      const toObj = tDate
        ? new Date(tDate)
        : null;

      if(fromObj){

        fromObj.setHours(0,0,0,0);

        if(rowDateObj < fromObj){
          return false;
        }

      }

      if(toObj){

        toObj.setHours(23,59,59,999);

        if(rowDateObj > toObj){
          return false;
        }

      }

    }

    return true;

  });

  currentPage = 0;

  renderTable();

}

/* ================= FILTER PRESET ================= */

function filterByPreset(preset){

  const now = new Date();

  const formatDate = d => {

    let month = '' + (d.getMonth() + 1);
    let day = '' + d.getDate();
    let year = d.getFullYear();

    if(month.length < 2) month = '0' + month;
    if(day.length < 2) day = '0' + day;

    return [year,month,day].join('-');

  };

  if(preset === 'yesterday'){

    let yesterday = new Date();

    yesterday.setDate(now.getDate() - 1);

    document.getElementById("fromDate").value =
      formatDate(yesterday);

    document.getElementById("toDate").value =
      formatDate(yesterday);

  }

  else if(preset === 'week'){

    let sevenDaysAgo = new Date();

    sevenDaysAgo.setDate(now.getDate() - 7);

    document.getElementById("fromDate").value =
      formatDate(sevenDaysAgo);

    document.getElementById("toDate").value =
      formatDate(now);

  }

  else if(preset === 'month'){

    let firstDay =
      new Date(now.getFullYear(), now.getMonth(), 1);

    let lastDay =
      new Date(now.getFullYear(), now.getMonth()+1,0);

    document.getElementById("fromDate").value =
      formatDate(firstDay);

    document.getElementById("toDate").value =
      formatDate(lastDay);

  }

  applyFilters();

}

/* ================= RESET ================= */

function resetFilters(){

  document.getElementById("fromDate").value = "";
  document.getElementById("toDate").value = "";
  document.getElementById("searchIMEI").value = "";
  document.getElementById("filterRetailer").value = "";

  applyFilters();

}

/* ================= RETAILER ================= */

function populateRetailerDropdown(){

  const sel =
    document.getElementById("filterRetailer");

  const retailers =
    [...new Set(masterRows.map(r => r.retailer))]
      .filter(Boolean)
      .sort();

  sel.innerHTML =
    `<option value="">All Retailers</option>` +
    retailers.map(r =>
      `<option value="${r}">${r}</option>`
    ).join('');

}

/* ================= REFRESH ================= */

function refreshData(){

  closeActionsMenu();

  showToast("Syncing with Server...", "success");

  loadDashboard();

}

/* ================= EXPORT ================= */

function exportExcel(){

  closeActionsMenu();

  if(!filteredRows.length){

    showToast("No data to export","error");

    return;

  }

  let csv =
    "IMEI,Product,Date,DMS,Retailer\n";

  filteredRows.forEach(r => {

    csv +=
      `"${r.imei}","${r.product}","${r.activated}","${r.dms}","${r.retailer}"\n`;

  });

  const blob =
    new Blob([csv], {type:'text/csv'});

  const a =
    document.createElement('a');

  a.href =
    window.URL.createObjectURL(blob);

  a.download =
    `Export_${new Date().toISOString().slice(0,10)}.csv`;

  a.click();

}

/* ================= TOAST ================= */

function showToast(message,type){

  const toast =
    document.getElementById("toast");

  toast.innerText = message;

  toast.className =
    `fixed top-20 right-4 z-[105] px-6 py-3 rounded-xl shadow-2xl text-white font-bold ${
      type === 'success'
        ? 'bg-emerald-600'
        : 'bg-red-600'
    }`;

  toast.classList.remove('hidden');

  setTimeout(() => {

    toast.classList.add('hidden');

  },3000);

}

/* ================= SEARCH ================= */

function debouncedApply(){

  clearTimeout(debounceTimer);

  debounceTimer =
    setTimeout(applyFilters,300);

}

/* ================= PAGINATION ================= */

function nextPage(){

  if((currentPage + 1) * pageSize < filteredRows.length){

    currentPage++;

    renderTable();

  }

}

function prevPage(){

  if(currentPage > 0){

    currentPage--;

    renderTable();

  }

}

/* ================= ACCORDION ================= */

function toggleAccordion(id){

  const targetMenu =
    document.getElementById(id);

  const targetContent =
    targetMenu.querySelector('.menu-content');

  const targetIcon =
    targetMenu.querySelector('.rotate-icon');

  const alreadyOpen =
    !targetContent.classList.contains('hidden');

  document.querySelectorAll('.menu-item').forEach(item => {

    const content =
      item.querySelector('.menu-content');

    const icon =
      item.querySelector('.rotate-icon');

    if(content){
      content.classList.add('hidden');
    }

    if(icon){
      icon.classList.remove('rotate-180');
    }

  });

  if(!alreadyOpen){

    targetContent.classList.remove('hidden');

    targetIcon.classList.add('rotate-180');

  }

}


</script>
